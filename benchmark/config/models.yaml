# Model configurations for StatLean Benchmark
# API keys are read from environment variables (never stored here)
# Updated: 2026-03-05 — all models are latest flagships

models:
  # --- Anthropic ---
  claude-opus-4.6:
    provider: anthropic
    model_id: claude-opus-4-6
    api_key_env: ANTHROPIC_API_KEY
    input_price_per_m: 15.0
    output_price_per_m: 75.0
    max_tokens: 16384
    temperature: 0.0
    notes: "Flagship (Opus 4.6)"

  claude-sonnet-4.6:
    provider: anthropic
    model_id: claude-sonnet-4-6
    api_key_env: ANTHROPIC_API_KEY
    input_price_per_m: 3.0
    output_price_per_m: 15.0
    max_tokens: 16384
    temperature: 0.0
    notes: "Cost-effective (Sonnet 4.6)"

  claude-haiku-4.5:
