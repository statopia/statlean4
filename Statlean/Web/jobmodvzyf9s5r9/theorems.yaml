    (ii) Note that $f_{\infty} > 0$ a.s.\ $\mathcal{P}$. Let $g_{i}(T) = T_{i}$, $i
    = 0, 1, 2, \ldots$. Then $f_{i}(x) = g_{i}(T(x)) f_{\infty}(x)$ a.s.\ $\mathcal{P}$.
    By Theorem 2.2, $T$ is sufficient for $P \in \mathcal{P}$. Suppose that $S(X)$
