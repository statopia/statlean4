  - theorem contains no axiom
  notes: |
    Existing Estimability.lean already covers (ii) substantially via
    `linear_estimator_unbiased` + `estimable_wellDefined`. New content needed:
    - (i) the equivalence l ∈ R(Z) ↔ l ∈ R(Z^τ Z) (and the Q^τ c framing)
    - (iii) the converse under Gaussian A1 (heavy: needs density + score eq)
  canonical_name: estimability_thm36
