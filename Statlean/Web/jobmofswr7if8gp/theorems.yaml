- id: input.lemma.001.ustatistic_degenerate_limit_second_moment
  title: Shao Lemma 3.2 â€” second moment of the U-statistic degenerate limit
  kind: lemma
  latex_statement: '\label{lem:shao_3_2}

    Let $Y = \dfrac{m(m-1)}{2} \sum_{j=1}^{\infty} \lambda_j \, (\chi_{1j}^2 - 1)$,

    where $\chi_{1j}^2$ are i.i.d. random variables having the chi-square distribution

    $\chi_1^2$, and $\lambda_j$''s are constants satisfying

    $\sum_{j=1}^{\infty} \lambda_j^2 = \zeta_2 < \infty$. Then

    \[

    E Y^2 = \frac{m^2 (m-1)^2}{2}\, \zeta_2 .

    \]'
  latex_proof_hint: "Define\n\\[\nY_k = \\frac{m(m-1)}{2} \\sum_{j=1}^{k} \\lambda_j\
    \ \\, (\\chi_{1j}^2 - 1), \\quad k = 1, 2, \\dots\n\\]\nIt can be shown (exercise)\
    \ that $\\{Y_k^2\\}$ is uniformly integrable. Since\n$Y_k \\to_d Y$ as $k \\to\
    \ \\infty$, we have $\\lim_{k \\to \\infty} E Y_k^2 = E Y^2$\n(Theorem 1.8(viii)).\
    \ Since $\\chi_{1j}^2$'s are independent chi-square random\nvariables with $E\
    \ \\chi_{1j}^2 = 1$ and $\\mathrm{Var}(\\chi_{1j}^2) = 2$,\n$E Y_k = 0$ for any\
    \ $k$ and\n\\[\nE Y_k^2 = \\frac{m^2 (m-1)^2}{4} \\sum_{j=1}^{k} \\lambda_j^2\
    \ \\, \\mathrm{Var}(\\chi_{1j}^2)\n       = \\frac{m^2 (m-1)^2}{4} \\left(2 \\\
    sum_{j=1}^{k} \\lambda_j^2\\right)\n       \\to \\frac{m^2 (m-1)^2}{2}\\, \\zeta_2\
    \ .\n\\]"
  proof_body: "Define\n\\[\nY_k = \\frac{m(m-1)}{2} \\sum_{j=1}^{k} \\lambda_j \\\
    , (\\chi_{1j}^2 - 1), \\quad k = 1, 2, \\dots\n\\]\nIt can be shown (exercise)\
    \ that $\\{Y_k^2\\}$ is uniformly integrable. Since\n$Y_k \\to_d Y$ as $k \\to\
    \ \\infty$, we have $\\lim_{k \\to \\infty} E Y_k^2 = E Y^2$\n(Theorem 1.8(viii)).\
    \ Since $\\chi_{1j}^2$'s are independent chi-square random\nvariables with $E\
    \ \\chi_{1j}^2 = 1$ and $\\mathrm{Var}(\\chi_{1j}^2) = 2$,\n$E Y_k = 0$ for any\
    \ $k$ and\n\\[\nE Y_k^2 = \\frac{m^2 (m-1)^2}{4} \\sum_{j=1}^{k} \\lambda_j^2\
    \ \\, \\mathrm{Var}(\\chi_{1j}^2)\n       = \\frac{m^2 (m-1)^2}{4} \\left(2 \\\
    sum_{j=1}^{k} \\lambda_j^2\\right)\n       \\to \\frac{m^2 (m-1)^2}{2}\\, \\zeta_2\
    \ .\n\\]"
