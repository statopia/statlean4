# R2 route hint extracted from Shao p.196 proof body
theorem: ustatistic_degenerate_limit_second_moment
strategy: |
  1. Define partial sums Y_k = (m(m-1)/2) Σ_{j<k} λ_j (X_j - 1) (already in hypothesis).
  2. Compute E Y_k² explicitly:
     - E[X_j - 1] = 0 since E[χ²_1] = 1.
     - Independence + zero mean ⇒ cross terms vanish:
       E[(X_i-1)(X_j-1)] = 0 for i ≠ j.
     - Diagonal: E[(X_j-1)²] = Var(X_j) = 2.
     - ⇒ E Y_k² = (m²(m-1)²/4) · Σ_{j<k} λ_j² · 2 = (m²(m-1)²/2) Σ_{j<k} λ_j².
  3. Take k → ∞:
     - Σ λ_j² is summable to ζ_2 ⇒ Σ_{j<k} λ_j² → ζ_2.
     - UI + Y_k →_d Y ⇒ E Y_k² → E Y² (Shao Theorem 1.8(viii)).
     - Combine: E Y² = lim_k E Y_k² = (m²(m-1)²/2) · ζ_2.

