  - id: integral_mono_ae_with_integrability
    category: integral
    goal: "∫ f ∂μ ≤ ∫ g ∂μ"
    tactics:
      - "apply integral_mono_ae h_f_int h_g_int; exact ae_of_all _ fun x => <bound>"
      - "apply integral_mono_ae h_f_int h_g_int; filter_upwards [...] with x hx; <bound>"
      - "exact integral_nonneg (fun ω => sq_nonneg _)"
