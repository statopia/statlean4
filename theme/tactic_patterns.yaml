  - id: variance_eq_sub_integral
    category: variance
    goal: "Var[X; μ] = ∫ X² dμ - (∫ X dμ)²"
    tactics:
      - "have hEq := variance_eq_sub hXc; simp only [Pi.pow_apply] at hEq"
      - "rw [variance_eq_sub hg_lp, variance_eq_sub hh_lp, variance_eq_sub hf]"
    notes: >
      `variance_eq_sub` requires `MemLp X 2 μ`.
      The result has `Pi.pow_apply` (since it's a Pi.fun), so `simp only [Pi.pow_apply]`
      is needed before using the equation with ring/linarith.
    frequency: 5
    sources:
      - "ANOVA.lean:129"
      - "RaoBlackwell.lean:24-25"
      - "LehmannScheffe.lean:105"

  - id: setIntegral_condVar_univ
    category: variance
    goal: "∫ Var[X|m] dμ = ∫ (X - E[X|m])² dμ"
    tactics: |
      calc μ[Var[Y; μ | G]]
          = ∫ ω in Set.univ, (Var[Y; μ | G]) ω ∂μ := by simp
        _ = ∫ ω in Set.univ, (Y ω - (μ[Y|G]) ω) ^ 2 ∂μ :=
            setIntegral_condVar (m := G) (hm := hG) (μ := μ) (X := Y) (s := Set.univ) hYres (by simp)
        _ = ∫ ω, (Y ω - μ[Y|G] ω) ^ 2 ∂μ := by simp
    notes: >
      `setIntegral_condVar` on `Set.univ` with `(by simp)` for the measurability side goal.
      The `simp` at the end removes `restrict Set.univ`.
    frequency: 2
    sources:
      - "RaoBlackwell.lean:155-160"

  - id: condExp_condExp_comm_via_induction_on_inter
    category: variance
    goal: "P[P[f|M]|N] =ᵐ P[P[f|N]|M]  (condExp commutativity on product space)"
    tactics: |
      -- Use Integrable.ae_eq_of_forall_setIntegral_eq to reduce to integral equality
      refine Integrable.ae_eq_of_forall_setIntegral_eq _ _ integrable_condExp integrable_condExp
        (fun s hs _hμs => ?_)
      -- Apply MeasurableSpace.induction_on_inter on a π-system that generates pi
      -- π-system: {A ∩ B ∩ C : A ∈ M ⊓ N, B ∈ σ_{i₀}, C ∈ σ_j}
      refine MeasurableSpace.induction_on_inter
        (generateFrom_piSys i₀ j hij).symm (isPiSystem_piSys i₀ j) ?_ ?_ ?_ ?_ s hs
      -- Goal 1 (∅): simp
      -- Goal 2 (π-system): independence of σ_coord from sigmaAlgExcept
      --   Both sides = ∫_A f · P(B) · P(C) by pullout + tower + independence
      -- Goal 3 (complement): ∫_{tᶜ} = ∫_univ - ∫_t
      -- Goal 4 (countable union): integral_iUnion + series equality
    notes: >
      Key pattern: condExp commutativity on product measure via π-λ theorem.
      Requires iIndepFun_pi for coordinate independence, and a π-system decomposition
      that separates the two conditioning σ-algebras + their intersection.
      The `Integrable.ae_eq_of_forall_setIntegral_eq` reduction is the standard approach
      for ae equality of condExp compositions.
    frequency: 2
    sources:
      - "EfronStein.lean:500-700 (condExp_condExp_comm_pi)"

  - id: integral_condVar_add_variance_condExp
    category: variance
    goal: "∫ Var[Y|G] dμ + Var[E[Y|G]; μ] = Var[Y; μ]  (law of total variance)"
    tactics:
      - "have h_total := integral_condVar_add_variance_condExp hG hY"
      - "simpa [add_comm] using (integral_condVar_add_variance_condExp hG hY).symm"
    notes: >
      `integral_condVar_add_variance_condExp` is the single Mathlib API for LOTV.
      `simpa [add_comm]` handles the commutativity of addition.
    frequency: 2
    sources:
      - "RaoBlackwell.lean:44"
      - "RaoBlackwell.lean:65"

# ────────────────────────────────────────────────────────────────────────────
# SECTION 13 — Compactness / topology patterns (USLLN-specific)
# ────────────────────────────────────────────────────────────────────────────

  - id: finite_cover_from_compactness
    category: topology
    goal: "obtain finite set S covering compact space Θ"
    tactics: |
      obtain ⟨S, hS⟩ := isCompact_univ.elim_finite_subcover
        (fun θ₀ => ball θ₀ (R θ₀)) (fun _ => isOpen_ball)
        (fun θ _ => mem_iUnion.mpr ⟨θ, mem_ball_self (hR_pos θ)⟩)
    notes: >
      `isCompact_univ.elim_finite_subcover` on a `CompactSpace`.
      The three arguments: open sets, openness proof, covering proof (every point is covered).
    frequency: 1
    sources:
      - "USLLN.lean:473-476"

  - id: ae_ball_for_finite_intersection
    category: topology
    goal: "∀ᵐ ω ∂P, ∀ θ ∈ S, P ω θ  (from pointwise ae for each θ in finite S)"
    tactics:
      - "exact (ae_ball_iff (Finset.countable_toSet S)).mpr this"
    notes: >
      `ae_ball_iff` converts a countable family of ae statements to a single ae ∀.
      Works for both `Finset` (use `.countable_toSet`) and general countable sets.
    frequency: 2
    sources:
      - "USLLN.lean:129 (slln_finset_ae)"
      - "USLLN.lean:514"

  - id: ciSup_le_for_oscillation_bounds
    category: topology
    goal: "⨆ k, f k ≤ C  (when each f k ≤ C)"
    tactics:
      - "exact ciSup_le hterm_le"
      - "exact ciSup_le fun _ => hv"
    notes: >
      `ciSup_le` closes goals of the form `⨆ k, f k ≤ C` when given `∀ k, f k ≤ C`.
      Requires `BddAbove` (often discharged by providing the same bound C).
    frequency: 4
    sources:
      - "USLLN.lean:257 (oscEnvelope_le_two_mul)"
      - "USLLN.lean:303-304"

# ────────────────────────────────────────────────────────────────────────────
# SECTION 14 — Anti-patterns and common pitfalls
# ────────────────────────────────────────────────────────────────────────────

anti_patterns:

  - id: pi_pow_apply_before_ring
    description: >
      `(f ^ 2) x ≠ f x ^ 2` for Pi-functions in Lean 4.
      `ring` cannot close goals with `Pi.pow_apply` expressions.
    fix: "simp only [Pi.pow_apply] before ring or linarith"
    frequency: 3
    sources:
      - "ANOVA.lean:41"
      - "RaoBlackwell.lean:25"

  - id: set_m_instance_confusion
    description: >
      `set m := MeasurableSpace.comap T ‹_›` makes Lean use `m` as the ambient
      MeasurableSpace instance. This reverses `.mono hle` direction and breaks
      `Integrable.of_bound`, `condExp_mono`, `StronglyMeasurable.mono` etc.
    fix: "Use explicit `condExp m ν f` notation or avoid `set m` entirely. Always pass the sigma-algebra explicitly when there is ambiguity."
    sources:
      - "MEMORY.md pattern #50"

  - id: false_lemma_f_poly_in_L2
    description: >
      f ∈ L²(γ) does NOT imply f · poly ∈ L²(γ).
      Counterexample: f(x) = e^{x²/4}/(1+x²)^{1/2} ∈ L²(γ) but x·f ∉ L²(γ).
    fix: "Use Hölder: L²(γ) · L²(γ) ⊆ L¹(γ). Only claim L¹ integrability for f · poly products."
    sources:
      - "MEMORY.md pattern #46"
      - "Hermite.lean restructuring (v15)"

  - id: stdGaussianPi_is_def_not_abbrev
    description: >
      `stdGaussianPi` is a `def`, not `abbrev`. Cannot unfold with `rw` or `convert`.
    fix: "Use `simp only [stdGaussianPi]` or `unfold stdGaussianPi`."
    sources:
      - "MEMORY.md pattern #68"

  - id: sqrt_n_cast_trap
    description: >
      `fun n => Real.sqrt n * (X n ω - c)` forces `n : ℝ`, breaking `X : ℕ → Ω → ℝ`.
    fix: "Write `fun (n : ℕ) => Real.sqrt ↑n * ...` with explicit ℕ annotation and ↑ cast."
    sources:
      - "DeltaMethod.lean delta_method_sqrt_n"

  - id: ae_eq_condExp_requires_sub_sigma_aesm
    description: >
      `ae_eq_condExp_of_forall_setIntegral_eq hm` requires `AEStronglyMeasurable[m] f μ`
      (sub-σ-algebra), NOT `AEStronglyMeasurable[m₀] f μ` (ambient). If f is
      pi-StronglyMeasurable via Doob-Dynkin, `.aestronglyMeasurable` gives ambient-sm.
      Need `sigmaAlgExcept j ⊓ sigmaAlgExcept i₀ = comap restrict (sigmaAlgExcept ⟨j,hj⟩)`
      to convert, which is ~100 lines of σ-algebra infrastructure.
    fix: >
      Pre-identify sub-σ-algebra measurability requirements BEFORE launching prove agents.
      Check if the proof goal involves `ae_eq_condExp` or `condExp_of_aestronglyMeasurable'`
      and plan the AEStronglyMeasurable[m] construction explicitly as a sub-lemma.
    sources:
      - "EfronStein.lean:1045 (efron_stein_core_gen sorry)"
      - "MEMORY.md pattern #72"

  - id: measurableset_not_membership
    description: >
      `s ∈ sigmaAlgExcept j` fails with "failed to synthesize Membership (Set _) (MeasurableSpace _)".
      MeasurableSpace is not a set of sets — `∈` notation does not work.
    fix: "Use `@MeasurableSet _ (sigmaAlgExcept j) s` or `show MeasurableSet[sigmaAlgExcept j] s`."
    sources:
      - "EfronStein.lean:979 (agent D error)"

  - id: anonymous_constructor_non_inductive
    description: >
      `⟨A, hA, rfl⟩` applied to a non-inductive type fails with
      "anonymous constructor is not available for this type".
      Happens when the expected type is a MeasurableSpace inequality, not an exists/struct.
    fix: "Split into `apply ...; exact ⟨A, hA, rfl⟩` to let Lean resolve the target type first."
    sources:
      - "EfronStein.lean:980 (agent D error)"

# ────────────────────────────────────────────────────────────────────────────
# SECTION 15 — Convergence in distribution / delta method patterns
# ────────────────────────────────────────────────────────────────────────────

  - id: delta_method_decomposition
    category: convergence
    goal: "aₙ(g(Xₙ)-g(c)) →ᵈ d·Y  (delta method)"
    tactics: |
      -- Decompose: aₙ(g(Xₙ)-g(c)) = d·Wₙ + Rₙ
      -- where Wₙ = aₙ(Xₙ-c), Rₙ = aₙ·r(Xₙ), r(x) = g(x)-g(c)-d(x-c)
      -- Step 1: d·Wₙ →ᵈ d·Y via continuous_comp (mul by constant is continuous)
      have h_dW : TendstoInDistribution (fun n ω => d * W n ω) l (fun ω => d * Y ω) μ :=
        hconv.continuous_comp (continuous_const.mul continuous_id)
      -- Step 2: Rₙ →ᵖ 0 via HasDerivAt.isLittleO + Xₙ →ᵖ c
      -- Step 3: Apply tendstoInDistribution_of_tendstoInMeasure_sub
      exact tendstoInDistribution_of_tendstoInMeasure_sub _ _ h_dW hR_to_zero hY_meas
    notes: >
      Key insight: use `tendstoInDistribution_of_tendstoInMeasure_sub` instead of
      `slutsky_add` — avoids needing measurability of the sum.
      The decomposition aₙ(g(X)-g(c)) = d·W + R is algebraic (ring identity).
      The remainder R →ᵖ 0 follows from HasDerivAt giving little-o + tightness.
    frequency: 1
    sources:
      - "DeltaMethod.lean:81-99"

  - id: sqrt_n_corollary_from_general
    category: convergence
    goal: "√n(g(Xₙ)-g(c)) →ᵈ d·Y  from general delta method"
    tactics: |
      exact delta_method
        (by filter_upwards [Filter.eventually_atTop.mpr ⟨1, fun n hn => hn⟩] with n hn
            exact Real.sqrt_pos_of_pos (by positivity))
        (Real.tendsto_sqrt_atTop.comp tendsto_natCast_atTop_atTop)
        hconv hg hg_meas hX_meas
    notes: >
      Standard pattern for instantiating aₙ = √n:
      - Positivity: filter_upwards + sqrt_pos_of_pos + positivity
      - Tendency: sqrt_atTop.comp natCast_atTop
      - Explicit (n : ℕ) annotation + ↑n cast required in the statement
      - Note: delta_method requires (hg_meas : Measurable g) in addition to HasDerivAt
    frequency: 1
    sources:
      - "DeltaMethod.lean:273-286"

  - id: portmanteau_tightness_from_convergence_in_dist
    category: convergence
    goal: "Wₙ →ᵈ Y  implies  P(|Wₙ| ≥ M) → 0 uniformly for large M"
    tactics: |
      -- 1. Extract ProbabilityMeasure-level convergence
      let pm_Y : ProbabilityMeasure ℝ := ⟨μ.map Y, ...⟩
      let pm_W : ι → ProbabilityMeasure ℝ := fun n => ⟨μ.map (Wₙ), ...⟩
      have hpm_conv : Tendsto pm_W l (nhds pm_Y) := hconv.tendsto
      -- 2. Tail decay: (μ.map Y){|y| ≥ M} → 0 via tendsto_measure_iInter_atTop
      -- 3. Portmanteau: limsup pm_W{|y|≥M} ≤ pm_Y{|y|≥M}
      -- 4. eventually_lt_of_limsup_lt for pointwise bound
    notes: >
      Reusable 4-step pattern: ProbMeasure extraction → tail decay → Portmanteau → pointwise.
      Antitone sets {|y|≥M} with empty intersection (via ⌈|y|⌉₊+1).
      NNReal ↔ ENNReal bridging handled by ProbabilityMeasure.coe_mk.
    frequency: 2
    sources:
      - "DeltaMethod.lean:74-128 (tightness lemma)"
      - "DeltaMethod.lean:164-201 (remainder bound)"

  - id: remainder_bound_via_isLittleO
    category: convergence
    goal: "aₙ·r(Xₙ) →ᵖ 0  where r(x) = o(x-c) from HasDerivAt"
    tactics: |
      -- Extract isLittleO from HasDerivAt
      have hlo := hasDerivAt_iff_isLittleO.mp hg
      -- Get η-ball bound: |r(x)| ≤ δ_r·|x-c| for |x-c| < η
      filter_upwards [hlo.def hδ_r_pos] with x hx
      -- Key inclusion: {|Rₙ|≥ε} ⊆ {|Xₙ-c|≥η} ∪ {|Wₙ|≥M}
      -- Proof by contradiction on complement: |Rₙ| = aₙ|r(Xₙ)| ≤ (ε/M)·|Wₙ| < ε
      -- Then measure_union_le + ENNReal.add_lt_add
    notes: >
      Set δ_r = ε/M where M comes from Portmanteau. The algebra uses
      hrw : aₙ·r(Xₙ) = aₙ·(g(Xₙ)-g(c)-(Xₙ-c)·d) by ring, then
      abs_mul + abs_of_pos + mul chain.
    frequency: 1
    sources:
      - "DeltaMethod.lean:203-256"
