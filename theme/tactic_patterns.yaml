  - id: integral_complex_ofReal_for_moments
    category: complex
    goal: "∫ (↑(f x) : ℂ) ∂μ = ↑(∫ f x ∂μ)"
    tactics:
      - "rw [integral_complex_ofReal]"
      - "rw [integral_complex_ofReal, hmean]; simp"
    notes: >
      `integral_complex_ofReal` converts a complex integral of a real-valued function
      to the ofReal-coercion of the real integral.
    frequency: 3
    sources:
      - "Taylor.lean:143"
      - "Taylor.lean:150"

  - id: charfun_via_integral_map
    category: complex
    goal: "charFun (μ.map Y) t = ∫ ω, exp(i·t·Y ω) ∂μ"
    tactics: |
      have char_eq : charFun (μ.map Y) t =
          ∫ ω, Complex.exp (↑(t * Y ω) * Complex.I) ∂μ := by
        rw [charFun_apply_real]
        have : ∫ x : ℝ, Complex.exp (↑t * ↑x * Complex.I) ∂(μ.map Y) =
            ∫ ω, Complex.exp (↑t * ↑(Y ω) * Complex.I) ∂μ :=
          integral_map_of_stronglyMeasurable hm (by fun_prop)
        rw [this]; congr 1; ext ω; push_cast; ring
    notes: >
      `charFun_apply_real` unfolds charFun to an integral over the pushforward.
      `integral_map_of_stronglyMeasurable` then pulls back to the base space.
    frequency: 2
    sources:
      - "Taylor.lean:109-117"

  - id: norm_exp_ofReal_mul_I_eq_one
    category: complex
    goal: "‖exp(i · t · x)‖ = 1  or  ≤ 1"
    tactics:
      - "rw [Complex.norm_exp_ofReal_mul_I]"
      - "ae_of_all _ fun ω => by rw [Complex.norm_exp_ofReal_mul_I]"
    notes: >
      `Complex.norm_exp_ofReal_mul_I` gives ‖exp(i · θ)‖ = 1 for real θ.
      Used repeatedly to establish integrability of complex exponential integrands.
    frequency: 3
    sources:
