# ────────────────────────────────────────────────────────────────────────────
# SECTION 7 — Inequality chain patterns (calc / gcongr)
# ────────────────────────────────────────────────────────────────────────────

  - id: calc_chain_for_norm_inequality
    category: inequality
    goal: "‖a - b‖ ≤ C  (via intermediate steps)"
    tactics: |
      calc ‖A - B‖
          = ‖(A - C) + (C - B)‖ := by ring_nf
        _ ≤ ‖A - C‖ + ‖C - B‖ := norm_add_le _ _
        _ ≤ bound1 + bound2 := by <linarith or gcongr>
        _ = C := by ring
    notes: >
      The standard pattern for triangle inequality arguments.
      `norm_add_le _ _` and `norm_sub_le _ _` are the two key lemmas.
      Final `ring` closes arithmetic. Used in USLLN triangle inequality and Taylor.
    frequency: 6
    sources:
      - "USLLN.lean:572-579"
      - "Taylor.lean:68-80 (norm_cexp_sub_quadratic_le case |θ| > 1)"
      - "Taylor.lean:163-170"

  - id: gcongr_for_monotone_inequalities
    category: inequality
    goal: "f a ≤ f b  when f is monotone and a ≤ b"
    tactics:
      - "gcongr"
      - "gcongr <; exact norm_mul_le _ _"
      - "gcongr with k _"
    notes: >
      `gcongr` is the monotonicity tactic — applies to norm, mul, pow, etc.
      Can be combined with `<;>` to solve all remaining side goals.
    frequency: 8
    sources:
      - "Taylor.lean:71 (gcongr)"
      - "Taylor.lean:211-212 (gcongr <;> exact norm_mul_le _ _)"
      - "Hermite.lean:511 (gcongr)"
      - "USLLN.lean:217 (gcongr)"

  - id: div_le_div_for_sum_bounds
    category: inequality
    goal: "(∑ f) / n ≤ (∑ g) / n  when f ≤ g pointwise"
    tactics: |
      apply div_le_div_of_nonneg_right _ (by positivity : (0 : ℝ) ≤ ↑n)
      exact Finset.sum_le_sum fun j _ => hdom j
    notes: >
      `div_le_div_of_nonneg_right` handles the division step.
      `Finset.sum_le_sum` handles the sum step with pointwise bounds.
    frequency: 2
    sources:
      - "USLLN.lean:408-410"

  - id: norm_prod_le_prod_norm
    category: inequality
    goal: "‖∏ i, f i‖ ≤ ∏ i, ‖f i‖  or  ≤ 1  (when ‖f i‖ ≤ 1)"
    tactics:
      - "Finset.norm_prod_le Finset.univ _"
      - "Finset.prod_le_one (fun i _ => norm_nonneg _) (fun i _ => hf i)"
    notes: >
      Two-step pattern: `norm_prod_le` gives ‖∏‖ ≤ ∏‖·‖, then
      `prod_le_one` closes when each norm ≤ 1.
    frequency: 3
    sources:
      - "Taylor.lean:215-218"
      - "Taylor.lean:619-621"

  - id: abs_le_pattern_for_real_norm
    category: inequality
    goal: "‖f x‖ ≤ C  or  |f x| ≤ C"
    tactics:
      - "rw [Real.norm_eq_abs, abs_of_nonneg h0x]"
      - "rw [Real.norm_of_nonneg (sq_nonneg _), ...]"
      - "rw [Real.norm_eq_abs, abs_sub_comm]; exact h_mu"
    notes: >
      Lean 4 Mathlib: real norm = abs. `Real.norm_eq_abs` converts between them.
      `abs_of_nonneg` and `abs_of_nonpos` simplify when sign is known.
    frequency: 6
    sources:
      - "Factorization.lean:93-94"
      - "ANOVA.lean:84-85"
      - "USLLN.lean:271"

# ────────────────────────────────────────────────────────────────────────────
# SECTION 8 — Product space / Fubini patterns
# ────────────────────────────────────────────────────────────────────────────

  - id: integral_prod_swap_for_Fubini
    category: product
    goal: "∫ (∫ f (x, y) ∂μ₀) ∂ν = ∫ (∫ f (x, y) ∂ν) ∂μ₀"
    tactics:
      - "rw [show ∫ y, (∫ x, φ (x, y) ^ 2 ∂μ₀) ∂ν = ∫ x, (∫ y, φ (x, y) ^ 2 ∂ν) ∂μ₀ from (integral_integral_swap (f := ...) hφ2_int).symm]"
      - "(integral_prod_symm f hfint).symm"
    notes: >
      `integral_integral_swap` requires joint integrability.
      `integral_prod_symm` swaps the order in `∫ f d(μ.prod ν)` vs `∫ f d(ν.prod μ)`.
    frequency: 3
    sources:
      - "ANOVA.lean:194-196"
      - "ANOVA.lean:165"

  - id: prod_slice_integrability
    category: product
    goal: "∀ᵐ x ∂μ₀, Integrable (fun y => f (x, y)) ν  from  Integrable f (μ.prod ν)"
    tactics:
      - "have hslice_sq : ∀ᵐ x ∂μ₀, Integrable (fun y => f (x, y) ^ 2) ν := hf.integrable_sq.prod_right_ae"
      - "have hslice_aesm : ∀ᵐ x ∂μ₀, AEStronglyMeasurable (fun y => f (x, y)) ν := hf.aestronglyMeasurable.prodMk_left"
    notes: >
      `.prod_right_ae` gives ae slices in the x-direction.
      `.prod_left_ae` gives ae slices in the y-direction.
      `.prodMk_left` gives ae strong measurability of slices.
    frequency: 4
    sources:
      - "ANOVA.lean:75-78"
      - "ANOVA.lean:99-102"

  - id: dimension_reduction_restrict_doob_dynkin
    category: product
    goal: "factor f : (∀ i, X i) → ℝ through restrict : (∀ i, X i) → (∀ j : {j // j ≠ i₀}, X j)"
    tactics: |
      -- 1. Define restrict map
      set restrict := (fun x (j : {j : ι // j ≠ i₀}) => x j.val)
      -- 2. Show sigmaAlgExcept i₀ ≤ comap restrict pi via comap_iSup + comap_comp
      have hle_comap : sigmaAlgExcept (X := X) i₀ ≤
          MeasurableSpace.comap restrict MeasurableSpace.pi := by
        calc sigmaAlgExcept i₀
            = ⨆ (k : ι) (_ : k ≠ i₀), σ_coord k := rfl
          _ = ⨆ (j : {j // j ≠ i₀}), σ_coord j.val := ...
          _ = ⨆ (j : {j // j ≠ i₀}), MeasurableSpace.comap (fun x => restrict x j) inferInstance :=
              by simp_rw [MeasurableSpace.comap_comp]
          _ = MeasurableSpace.comap restrict (⨆ j, MeasurableSpace.comap (· j) inferInstance) :=
              (MeasurableSpace.comap_iSup).symm
          _ = MeasurableSpace.comap restrict MeasurableSpace.pi := rfl
      -- 3. Doob-Dynkin factoring
      obtain ⟨gtil, hgtil_sm, hg_factor⟩ := (hg_sm.mono hle_comap).exists_eq_measurable_comp
      -- 4. Pushforward measure identity
      have hpi_map : (Measure.pi μ).map restrict = Measure.pi μ' := by
        exact measurePreserving_piEquivPiSubtypeProd ... |>.map_eq
    notes: >
      Core pattern for dimension reduction induction on product spaces.
      `comap_iSup` distributes comap over iSup for σ-algebra generators.
      `comap_comp` rewrites `comap (f ∘ g) = comap g (comap f)`.
      After factoring, transfer variance via `variance_map` and integrability via
      `integrable_map_measure`. Then apply induction hypothesis on reduced space.
    frequency: 2
    sources:
      - "EfronStein.lean:870-960 (efron_stein_core_gen dimension reduction)"

  - id: integrable_map_measure_transfer
    category: product
    goal: "Integrable gtil (P.map restrict)  from  Integrable (gtil ∘ restrict) P"
    tactics:
      - "exact (integrable_map_measure hgtil_sm.aestronglyMeasurable hrestrict_meas.aemeasurable).mpr hf_int"
      - "rwa [hpi_map] at this"
    notes: >
      `integrable_map_measure` requires AEStronglyMeasurable of the function and
      AEMeasurable of the map. For `MemLp`, use `memLp_map_measure_iff` similarly.
      Common in dimension reduction: transfer integrability from ambient to reduced space.
    frequency: 2
    sources:
      - "EfronStein.lean:940-945"

  - id: sum_subtype_reindex
    category: product
    goal: "∑ j in univ.erase i₀, f j = ∑ (j : {j // j ≠ i₀}), g j.val"
    tactics: |
      -- Rewrite each term first
      simp_rw [hterm_eq]
      -- Then reindex
      symm
      apply Finset.sum_subtype (Finset.univ.erase i₀) (fun x => by simp [Finset.mem_erase])
    notes: >
      `Finset.sum_subtype` reindexes a sum from a filtered Finset to a subtype Finset.
      The second argument is a proof that `x ∈ S ↔ (predicate on x)`.
      Key: the predicate for `univ.erase i₀` is `fun x => x ≠ i₀`, proved by `simp [Finset.mem_erase]`.
    frequency: 2
    sources:
      - "EfronStein.lean:1000-1010"

