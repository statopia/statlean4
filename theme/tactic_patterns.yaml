  - id: filter_upwards_with_pattern
    category: ae
    goal: "∀ᵐ x ∂μ, P x"
    tactics:
      - "filter_upwards [h1, h2, ...] with x hx1 hx2 ...; <proof of P x>"
      - "filter_upwards [h_ae] with x hx; <use hx>"
      - "filter_upwards with x; <if no hypotheses needed>"
    notes: >
      The standard way to close ae goals in Lean 4 Mathlib.
      `filter_upwards [...]` introduces named hypotheses for each input ae-goal.
      The number of names after `with x` must match the number of hypotheses in brackets.
      For `ae_of_all`: use when the property holds pointwise without any ae assumptions.
    frequency: 20+
    sources:
      - "Factorization.lean:91-93 (filter_upwards [h0, hmono] with x h0x h1x)"
      - "ANOVA.lean:80-81 (filter_upwards [hslice_aesm, hslice_sq] with y ha hq)"
      - "LehmannScheffe.lean:245 (filter_upwards [h_inv] with ω hω)"
      - "Hermite.lean:637-638 (filter_upwards with x)"

  - id: ae_of_all_for_pointwise
    category: ae
    goal: "∀ᵐ x ∂μ, P x  (when P x holds for ALL x)"
    tactics:
      - "ae_of_all _ fun x => <proof>"
      - "ae_of_all μ fun ω => sq_nonneg _"
      - "Filter.Eventually.of_forall fun x => <proof>"
    notes: >
      `ae_of_all` is the preferred tactic when P holds without any measure-theoretic content.
      `Filter.Eventually.of_forall` is the explicit term-mode version (same thing).
      Both appear frequently throughout the codebase.
    frequency: 15+
    sources:
      - "Factorization.lean:85 (ae_of_all ν fun x => Set.indicator_nonneg ...)"
      - "RaoBlackwell.lean:55 (ae_of_all μ fun ω => sq_nonneg _)"
