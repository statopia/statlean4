  - id: nat_strong_rec_on
    category: induction
    goal: "induction on k with access to ∀ m < k hypothesis"
    tactics: |
      induction k using Nat.strongRecOn with
      | ind k ih =>
      <proof using ih : ∀ m < k, ...>
    notes: >
      Used in Hermite orthogonality (double induction on m + n = k) and
      Hermite span density (strong induction on monomials).
      Standard Lean 4 name: `Nat.strongRecOn` (via `induction ... using`).
    frequency: 2
    sources:
      - "Hermite.lean:192-193"
      - "Hermite.lean:690"

  - id: obtain_exists_for_dchoice
    category: structural
    goal: "extract witness from ∃ x, P x"
    tactics:
      - "obtain ⟨g, hg, hgT⟩ := hrn_meas.exists_eq_measurable_comp (f := T)"
      - "obtain ⟨η, hη_pos, hη⟩ := Metric.continuousAt_iff.mp ... ε hε"
      - "obtain ⟨N, hN⟩ := hDCT (η / 2) (by linarith)"
    notes: >
      `obtain ⟨...⟩ := ...` is the standard way to destructure existential witnesses.
      Used throughout for: Doob-Dynkin factorization, metric continuity, DCT convergence.
    frequency: 15+
    sources:
      - "Factorization.lean:191"
      - "USLLN.lean:375"
      - "USLLN.lean:267"

  - id: haveI_for_instances
    category: structural
    goal: "establish a typeclass instance needed for subsequent steps"
    tactics:
      - "haveI : IsProbabilityMeasure (P.measure θ) := P.isProbability θ"
      - "haveI : IsFiniteMeasure (P.measure θ) := inferInstance"
      - "haveI : SigmaFinite ((P.measure θ).trim hm_le) := inferInstance"
      - "haveI : @SigmaFinite Ω m_T (ν.trim hle) := by ..."
    notes: >
      `haveI` (vs `have`) makes the proof available as a typeclass instance.
      Needed when Lean cannot infer the instance automatically (e.g., trimmed measures,
      specific probability measures).
    frequency: 10+
    sources:
      - "LehmannScheffe.lean:221-223"
      - "Factorization.lean:167-173"

  - id: tendsto_integral_dominated_convergence
    category: limits
    goal: "∫ F_n → ∫ F  (dominated convergence)"
    tactics: |
      apply tendsto_integral_of_dominated_convergence (bound := fun ω => h ω)
      · exact fun n => <AEStronglyMeasurable F_n>    -- measurability
      · exact hbound_int                              -- bound integrable
      · exact fun n => ae_of_all _ fun ω => <‖F_n‖ ≤ h>  -- domination
      · exact ae_of_all _ fun ω => <F_n → F>         -- pointwise convergence
    notes: >
      Argument order for `tendsto_integral_of_dominated_convergence`:
      bound, F_n-measurability, bound-integrable, norm bound, pointwise limit.
      All ae-conditions use `ae_of_all _` when they hold pointwise.
    frequency: 3
    sources:
      - "USLLN.lean:366-372 (hDCT)"
      - "Taylor.lean:541-545 (hlim)"

  - id: continuous_of_dominated_for_param_integrals
    category: limits
    goal: "Continuous (θ ↦ ∫ f(x, θ) ∂μ)"
    tactics: |
      apply continuous_of_dominated (F := fun θ a => U a θ) (bound := M)
      · intro θ; exact (hU_meas θ).aestronglyMeasurable
      · intro θ; exact ae_of_all _ (fun a => hM_bound a θ)
      · exact (integrable_map_measure ...).mpr hM_int
      · exact ae_of_all _ (fun a => hU_cont a)
    notes: >
      `continuous_of_dominated` is the parameterized DCT for continuity.
      Arguments: F (the integrand), bound, F measurable, bound ae, bound integrable,
      F continuous in parameter.
    frequency: 1
    sources:
      - "USLLN.lean:143-150 (popMean_continuous)"

# ────────────────────────────────────────────────────────────────────────────
# SECTION 12 — Variance / condVar patterns
