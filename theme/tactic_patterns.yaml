  - id: lintegral_chain_for_finiteness
    category: integral
    goal: "∫⁻ f dμ ≠ ⊤  (used to establish integrability)"
    tactics: |
      exact ne_top_of_le_ne_top (measure_ne_top μ _) <|
        calc ∫⁻ x, rn_T x ∂ν
            = ∫⁻ x, rn_T x ∂(ν.trim hle) := (lintegral_trim hle hrn_meas).symm
          _ ≤ (μ.trim hle) Set.univ := Measure.lintegral_rnDeriv_le
          _ = μ Set.univ := trim_measurableSet_eq hle .univ
    notes: >
      Pattern for trimmed-measure RN derivative finiteness.
      `lintegral_trim` converts between trimmed and full measure.
      `Measure.lintegral_rnDeriv_le` gives the key bound.
    frequency: 2
    sources:
      - "Factorization.lean:185-189 (hrn_real_int)"
      - "Factorization.lean:204-211 (h_rhs_ne_top)"

