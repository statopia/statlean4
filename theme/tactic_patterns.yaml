      - "have hce : μ[Y|G] = Y := condExp_of_stronglyMeasurable hG hYm hYint; rw [hce]"
    notes: >
      `condExp_of_stronglyMeasurable` requires `hG : G ≤ m₀`, `hYm : StronglyMeasurable[G] Y`,
