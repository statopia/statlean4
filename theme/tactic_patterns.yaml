  - id: doob_dynkin_exists_comp
    category: condExp
    goal: "E[f|σ(T)] is σ(T)-measurable, so = h ∘ T"
    tactics: |
      obtain ⟨h, hh_meas, hψ_eq⟩ := hψ_sm.measurable.exists_eq_measurable_comp (f := T)
      -- hψ_eq : E[f|σ(T)] = h ∘ T  (pointwise equality of functions)
      -- Use: congr_fun hψ_eq x  to get pointwise value
    notes: >
      `StronglyMeasurable[m_T].measurable.exists_eq_measurable_comp` is the Doob-Dynkin
      lemma. Returns `∃ h : S → ℝ, Measurable h ∧ E[f|m_T] = h ∘ T`.
      Requires `StandardBorelSpace S` (or at least `MeasurableSpace S` with the right structure).
    frequency: 3
