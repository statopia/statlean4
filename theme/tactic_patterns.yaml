patterns:

  - id: integral_congr_ae_of_forall
    category: integral
    goal: "∫ x, f x ∂μ = ∫ x, g x ∂μ  (pointwise equality)"
    tactics:
      - "congr 1; ext x; <algebra>"
      - "integral_congr_ae (ae_of_all _ fun x => by <algebra>)"
    notes: >
      Use `congr 1; ext x` when the equality is definitional/`ring`.
      Use `integral_congr_ae (ae_of_all _ fun x => ...)` when the step needs
      a rewrite (e.g., simp, ring, or Pi.mul_apply) to make the terms match.
      Both forms appear in nearly every file.
    frequency: 10
    sources:
      - "Factorization.lean:126-128 (setIntegral_congr_ae)"
      - "Hermite.lean:150-151 (hrearrange: congr 1; ext x; ring)"
      - "ANOVA.lean:152 (integral_congr_ae (ae_of_all _ fun z => by simp [φ]; ring))"
      - "Taylor.lean:117 (congr 1; ext ω; push_cast; ring)"
      - "LehmannScheffe.lean:118 (integral_congr_ae (ae_of_all _ h_expand))"

  - id: setIntegral_congr_ae_mono
    category: integral
    goal: "∫ x in s, f x ∂μ = ∫ x in s, g x ∂μ"
    tactics:
      - "apply setIntegral_congr_ae hs_mΩ; filter_upwards [h_ae] with x hx _; exact hx"
      - "setIntegral_congr_ae hs (h_ae.mono fun x hx _ => hx)"
    notes: >
      The second argument of the congr lemma is `∀ x ∈ s, ...` (takes an extra `_` for
      the membership proof). Use `filter_upwards [h_ae] with x hx _` — the trailing `_`
      discards the set-membership hypothesis.
    frequency: 4
    sources:
      - "Factorization.lean:126-128 (step2)"
      - "Factorization.lean:129-133 (step3)"
      - "Basu.lean:218-219 (setIntegral_congr_ae + condExp_const_ae.mono)"

  - id: integral_split_add_sub
    category: integral
    goal: "∫ (f + g) = ∫ f + ∫ g  or  ∫ (f - g) = ∫ f - ∫ g"
    tactics:
      - "rw [integral_add h_int1 h_int2]"
      - "rw [integral_sub h_int1 h_int2]"
      - "exact integral_sub (h1_int θ) (h2_int θ)"
      - "rw [← integral_add hint_H hint_r]; congr 1; ext x; <algebra>"
    notes: >
      Always requires explicit integrability hypotheses for both summands.
      When goal is `∫ (f - g)` but f and g are expressed as lambdas (not Pi.sub),
      use `rw [show (fun x => f x - g x) = f - (fun _ => g _) from rfl]` first.
    frequency: 12
