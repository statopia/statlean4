  - id: ae_eq_condExp_of_forall_setIntegral_eq
    category: condExp
    goal: "prove h =ᵃᵉ E[f|m] by verifying set integral characterization"
    tactics: |
      refine ae_eq_condExp_of_forall_setIntegral_eq hm hf_int ?_ ?_ ?_
      · intro s _hs _hμs; exact h_int.integrableOn      -- IntegrableOn h s
      · intro s hs _hμs                                  -- ∫_s h = ∫_s f
        <chain of step1 ... stepN + linarith>
      · exact stronglyMeasurable_condExp.aestronglyMeasurable  -- AEStronglyMeasurable[m]
    notes: >
      The characterization of condExp via set integrals. The three goals are:
      (1) IntegrableOn h over m-measurable sets, (2) ∫_s h = ∫_s f for m-measurable s,
      (3) AEStronglyMeasurable[m] h. Used in factorization_backward.
    frequency: 2
    sources:
      - "Factorization.lean:105-149 (ae_eq_condExp_of_forall_setIntegral_eq)"

  - id: condExp_of_stronglyMeasurable_simplify
