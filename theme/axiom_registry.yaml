      Stein 1956 / James–Stein 1961: for `d ≥ 3`, the James–Stein estimator
      strictly dominates the MLE in squared-error risk uniformly in θ.
      Formula: `R(JS, θ) = d σ² - (d-2)² σ⁴ E[1/‖Y‖²] < d σ² = R(MLE, θ)`.
    citation: |
      Stein (1956), *Proc. 3rd Berkeley Symp.*; James–Stein (1961);
      Lehmann–Casella, *Theory of Point Estimation* (2nd ed.), §5.5.
    blocker: |
