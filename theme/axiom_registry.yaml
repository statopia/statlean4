# StatLean User Axiom Registry
#
# Tracks every `axiom` / `private axiom` declaration in the StatLean codebase,
# together with provenance, blocker, replacement path, and Mathlib upgrade
# triggers. Used by `theme/scripts/check_axiom_registry.py` to detect drift
# between code and registry.
#
# Categories:
#   * historical       — early-project axioms (pre-R6 protocol)
#   * R6_genuine       — Mathlib-infrastructure-deep results (Massart DKW,
#                        TDA stability, MEK duality, Slepian/Gordon, ...)
#   * R6_engineering   — Mathlib has primitives but assembly is non-trivial
#                        (~150+ LOC), e.g. UStat 4-block Fubini
#   * R6_API_gap       — pure Mathlib API gap; landing the missing API
#                        immediately discharges the axiom
#
# Schema is documented in `theme/scripts/check_axiom_registry.py`.

axioms:

# ---------------------------------------------------------------------------
# HISTORICAL — pre-R6 batch (Talagrand, Gordon, MarchenkoPastur, NormalLinearModel)
# ---------------------------------------------------------------------------

  - id: concentration.talagrand.mcdiarmid_mgf_bound
    file: Statlean/Concentration/Talagrand.lean
    line: 550
    kind: main
    category: historical
    math_content: |
      McDiarmid MGF bound: For `f` with bounded differences `c` on a product
      space, the MGF of `f - E[f]` under the product measure is bounded by
      `exp(λ² · ∑cᵢ² / 8)`. Standard route is Doob's martingale decomposition
      `f - E[f] = ∑ Dᵢ` (martingale differences with `|Dᵢ| ≤ cᵢ`) plus
      Hoeffding's lemma applied to each conditional exponential moment via
      iterated Fubini.
    citation: Boucheron–Lugosi–Massart, *Concentration Inequalities*, Thm 6.2; McDiarmid 1989.
    blocker: |
      Mathlib 4.28 lacks `condexp` infrastructure for finite product spaces
      (no `Measure.pi_succ_above` conditional expectation). Iterated Fubini
      over `Measure.pi μ` requires this.
    replacement_path: |
      1. Build `condExp` API for `Measure.pi` (project the i-th coordinate).
      2. Hoeffding's lemma per martingale-difference (already in Mathlib as
         `MeasureTheory.exp_mul_le_exp_var_div_eight` for bounded RVs).
      3. Telescope using `condExp_pi_pi_succAbove`.
    mathlib_upgrade_trigger:
      - "Mathlib.Probability.CondExp.Pi (conditional expectation on product spaces)"
      - "Mathlib.Probability.Martingale.Hoeffding (Doob decomposition for bounded-differences martingales)"
    estimated_effort: ~250 LOC
    priority: med
    date_added: 2026-05-07

  - id: gaussian.gordon.slepian_lemma
    file: Statlean/Gaussian/Gordon.lean
    line: 138
    kind: main
    category: historical
    math_content: |
      Slepian's lemma: under `SlepianCondition` (centered Gaussians with
      `Var Xᵢ = Var Yᵢ`, `Cov Xᵢ Xⱼ ≤ Cov Yᵢ Yⱼ`), `E[max Xᵢ] ≤ E[max Yᵢ]`.
      Proof: Lindeberg/Gaussian interpolation `Z(t) = √t·X + √(1-t)·Y`, then
      multivariate Gaussian IBP (Stein) gives
      `d/dt E[φ(Z(t))] = ½ Σ_{i≠j} (Cov(Xᵢ,Xⱼ) - Cov(Yᵢ,Yⱼ)) · ∂²φ/∂xᵢ∂xⱼ ≥ 0`
      for `φ = max` (convexity), hence monotone in `t`.
    citation: Slepian (1962), *Bell Syst. Tech. J.* 41, 463–501; Vershynin §6.5.
    blocker: |
      Mathlib 4.28 lacks (a) multivariate Gaussian integration-by-parts (Stein
      identity for `Fin n → ℝ`), (b) parametric differentiation of
      `E[φ(Z(t))]` for non-smooth `φ = max`, (c) the smoothing argument that
      transfers to non-smooth `φ`.
    replacement_path: |
      1. Multivariate Stein/IBP on `Fin n → ℝ` Gaussians.
      2. Smoothing of `max` via `softmax_β → max` as `β → ∞`.
      3. Differentiation under the integral sign (already partial in Mathlib).
    mathlib_upgrade_trigger:
      - "Mathlib.Probability.Gaussian.Multivariate.IBP (Stein for Fin n → ℝ)"
      - "Mathlib.Analysis.Smooth.Softmax (smooth approximation of max)"
    estimated_effort: ~350 LOC
    priority: low
    date_added: 2026-05-07

  - id: gaussian.gordon.gordon_minimax_axiom
    file: Statlean/Gaussian/Gordon.lean
    line: 274
    kind: main
    category: historical
    math_content: |
      Gordon's minimax theorem: under `GordonCondition` (mean-zero Gaussian
      matrices with row-covariance ≤ and column-covariance ≥), the inequality
      `E[min_i max_j X_{ij}] ≤ E[min_i max_j Y_{ij}]` holds. Same Gaussian
      interpolation route as Slepian, with the sign analysis on the two-index
      covariance comparison.
    citation: Gordon (1985), *Israel J. Math.* 50, 265–289; Vershynin §7.4.
    blocker: |
      Same as `slepian_lemma` (multivariate Gaussian IBP, parametric
      differentiation under the integral, smoothing of `min ∘ max`).
    replacement_path: |
      Discharge `slepian_lemma` first (gives the IBP + smoothing template),
      then iterate the same argument with `φ = min ∘ max` and the matched
      sign analysis on row/column covariance differences.
    mathlib_upgrade_trigger:
      - "Same as slepian_lemma — depends on multivariate Stein"
    estimated_effort: ~400 LOC (incl. shared infra with Slepian)
    priority: low
    date_added: 2026-05-07

  - id: randommatrix.mp.mpMeasure_isProbabilityMeasure_axiom
    file: Statlean/RandomMatrix/MarchenkoPastur.lean
    line: 194
    kind: main
    category: historical
    math_content: |
      Total mass of the Marchenko–Pastur measure equals 1 when `σ > 0`,
      `γ > 0`. Concretely:
      `∫_{λ₋}^{λ₊} √((λ₊-x)(x-λ₋)) / (2π σ² γ x) dx + max(1 - 1/γ, 0) = 1`.
    citation: Bai–Silverstein, *Spectral Analysis of Large Dimensional Random Matrices*, §3.1.
    blocker: |
      Closed-form definite integral `∫ √((a-x)(x-b))/x dx` over `[b, a]` is
      not available in Mathlib (requires substitution / residue computation).
    replacement_path: |
      1. Substitute `x = (λ₋ + λ₊)/2 + ((λ₊ - λ₋)/2) cos θ`.
      2. Compute resulting trigonometric integral via standard reductions.
      3. Combine with the atom mass `max(1 - 1/γ, 0)` at the origin.
    mathlib_upgrade_trigger:
      - "Closed-form for ∫ √((a-x)(x-b))/x dx (currently no API)"
    estimated_effort: ~200 LOC
    priority: low
    date_added: 2026-05-07

  - id: randommatrix.mp.mpStieltjes_fixed_point_axiom
    file: Statlean/RandomMatrix/MarchenkoPastur.lean
    line: 235
    kind: main
    category: historical
    math_content: |
      The Stieltjes transform `m(z) = ∫ 1/(x - z) d(mpMeasure σ γ)(x)` of the
      MP distribution satisfies the fixed-point equation
      `m = 1 / (-z + γσ² / (1 + σ² m))` for `z` outside the support.
    citation: Marchenko–Pastur (1967); Tao, *Topics in Random Matrix Theory* §2.4.
    blocker: |
      Requires evaluation of `∫_{λ₋}^{λ₊} 1/((x-z) x) · √((λ₊-x)(x-λ₋)) dx`
      in closed form (elliptic-integral / residue methods not in Mathlib).
    replacement_path: |
      1. Same substitution trick as `mpMeasure_isProbabilityMeasure_axiom`.
      2. Recognize the partial-fraction algebra after the substitution.
      3. Combine with `stieltjesTransform_dirac` for the atomic part.
    mathlib_upgrade_trigger:
      - "Mathlib.Analysis.SpecialFunctions.Stieltjes (Stieltjes transform identities for densities with √-singularities)"
    estimated_effort: ~300 LOC
    priority: low
    date_added: 2026-05-07

  - id: randommatrix.mp.stieltjes_continuity_theorem_axiom
    file: Statlean/RandomMatrix/MarchenkoPastur.lean
    line: 293
    kind: main
    category: R6_genuine
    math_content: |
      Stieltjes continuity theorem: pointwise convergence of Stieltjes
      transforms off the support of the limit measure implies weak
      convergence of the underlying probability measures.
    citation: Bai–Silverstein, *Spectral Analysis of Large Dimensional Random Matrices*, Thm B.9; Tao §2.4.4.
    blocker: |
      Requires Stieltjes inversion + Vitali/Montel for analytic functions on
      the upper half-plane + Helly selection + Portmanteau. Mathlib has
      Helly + Portmanteau (partial) but not Stieltjes inversion or
      Vitali–Montel.
    replacement_path: |
      1. Stieltjes inversion: recover `μ` from `Im m(x + iε)` as `ε → 0⁺`.
      2. Helly selection of `{μ_k}`.
      3. Identify limit via Vitali–Montel + uniqueness of Stieltjes transform.
      4. Portmanteau to pass to expectations.
    mathlib_upgrade_trigger:
      - "Mathlib.Analysis.NormedSpace.HalfPlane.Vitali (Vitali–Montel)"
      - "Mathlib.MeasureTheory.Measure.Stieltjes.Inversion (Stieltjes inversion)"
    estimated_effort: ~500 LOC
    priority: low
    date_added: 2026-05-07

  - id: regression.normallinear.lse_indep_sigmaSqHat
    file: Statlean/Regression/NormalLinearModel.lean
    line: 162
    kind: main
    category: historical
    math_content: |
      Shao Thm 3.8(i): under A1, `lᵀβ̂` and `σ̂²` are independent for any
      estimable `lᵀβ`. Proof = (linear-algebraic) cross-covariance
      `(I - ZHZᵀ) · ZHl = 0` + (probabilistic) jointly normal RVs with
      vanishing cross-covariance are independent (Shao Exercise 1.58).
    citation: Shao, *Mathematical Statistics* (2nd ed.), Thm 3.8(i).
    blocker: |
      Mathlib 4.28 lacks vector-valued `IsGaussian` on `Fin n → ℝ` and the
      characteristic-function factorisation argument for the multivariate
      Gaussian case (`charFunDual_eq_prod_iff` specialised to multivariate).
    replacement_path: |
      1. Build `IsGaussianVector` on `Fin n → ℝ`.
      2. Joint-normal pushforward under linear maps.
      3. Specialise `charFunDual_eq_prod_iff` to vanishing cross-covariance ⇒ product law.
    mathlib_upgrade_trigger:
      - "Mathlib.Probability.Distributions.Gaussian.Multivariate (IsGaussianVector)"
      - "Mathlib.Probability.CharFun.Multivariate.Factorise"
    estimated_effort: ~400 LOC
    priority: med
    date_added: 2026-05-07

  - id: regression.normallinear.lse_distribution
    file: Statlean/Regression/NormalLinearModel.lean
    line: 196
    kind: main
    category: historical
    math_content: |
      Shao Thm 3.8(ii): the marginal distribution of `lᵀβ̂` is
      `N(lᵀβ, σ²·lᵀ H l)`. Proof: write `lᵀβ̂ = lᵀβ + σ·⟨c, ε⟩` with
      `c = (HZᵀ)ᵀl`; then by induction + Gaussian stability under
      iid affine combination, `⟨c, ε⟩ ~ N(0, ‖c‖²)`. The matrix identity
      `ZᵀZ · H · ZᵀZ = ZᵀZ` reduces variance to `σ²·lᵀHl`.
    citation: Shao, *Mathematical Statistics* (2nd ed.), Thm 3.8(ii).
    blocker: |
      Mathlib 4.28 lacks the inductive argument for finite weighted Gaussian
      sums on `Fin n` and the matrix-identity machinery
      `lᵀHZᵀZHl = lᵀHl` from estimability. Pairwise `IndepFun` extraction
      from `Measure.pi` is also incomplete.
    replacement_path: |
      1. Pairwise `IndepFun` from `Measure.pi`.
      2. Induction on `Fin n` for `gaussianReal_add_gaussianReal_of_indepFun`.
      3. Matrix identity by computing `Zᵀ · (estimability lifts) = Zᵀa`.
    mathlib_upgrade_trigger:
      - "Mathlib.Probability.IndepFun.Pi (pairwise IndepFun from Measure.pi)"
      - "Same gaussian multivariate gap as lse_indep_sigmaSqHat"
    estimated_effort: ~250 LOC
    priority: med
    date_added: 2026-05-07

  - id: regression.normallinear.sigmaSqHat_chiSquared
    file: Statlean/Regression/NormalLinearModel.lean
    line: 230
    kind: main
    category: historical
    math_content: |
      Shao Thm 3.8(iii): `(n - r)·σ̂²/σ² ~ χ²_{n-r}` under A1. By Cochran's
      theorem applied to the symmetric idempotent `I - P` of rank `n - r`
      acting on standardised errors `ε ~ N(0, Iₙ)`.
    citation: Shao, *Mathematical Statistics* (2nd ed.), Thm 3.8(iii); Cochran (1934).
    blocker: |
      Mathlib lacks Cochran's theorem and its prerequisites: multivariate
      Gaussian on `Fin n → ℝ`, spectral decomposition of symmetric
      idempotents, and the link between `chiSquared` (gamma-based) and
      sums of squared standard normals.
    replacement_path: |
      1. `Matrix.IsSymm.spectral_decomposition` for symmetric idempotents.
      2. `IsGaussianVector` invariance under orthogonal transforms.
      3. `chiSquared k = Measure.map (∑ᵢ Zᵢ²) (Measure.pi (gaussianReal 0 1))` for the canonical Z's.
    mathlib_upgrade_trigger:
      - "Mathlib.LinearAlgebra.Matrix.SymmIdempotent.SpectralDecomposition"
      - "Mathlib.Probability.Distributions.ChiSquared.OfGaussianSum (link χ² ~ ∑Zᵢ²)"
    estimated_effort: ~450 LOC
    priority: med
    date_added: 2026-05-07

# ---------------------------------------------------------------------------
# UStatistic — 4 axioms (mix of engineering + chi-square API gap)
# ---------------------------------------------------------------------------

  - id: variance.ustatistic.integral_hSub_mul_hSub
    file: Statlean/Variance/UStatistic.lean
    line: 503
    kind: helper
    category: R6_engineering
    math_content: |
      Hoeffding 4-block decomposition of `∫ (hSub h s)(hSub h t) dν^n`:
      under `Fin n ≃ (S∩T) ⊔ (S\T) ⊔ (T\S) ⊔ rest`, the joint product
      integral factors into `∫ (kernelProjection m k h ν a)² dν^k` over the
      intersection coordinates `a` of cardinality `k = |S ∩ T|`.
    citation: Hoeffding (1948), *AMS* 19, 293–325; Serfling 1980 §5.5.
    blocker: |
      Engineering only: Mathlib has all primitives (`Measure.pi`,
      `piEquivPiSubtypeProd`, `MeasureTheory.integral_prod`, kernel symmetry).
      Assembly = ~150 LOC of nested `piEquivPiSubtypeProd` chains and
      Fubini swaps.
    replacement_path: |
      1. Apply `piEquivPiSubtypeProd` with predicate `j ∈ s.val ∩ t.val`.
      2. Within complement, apply again with `j ∈ s.val \ t.val` (extract `b`).
      3. Apply once more with `j ∈ t.val \ s.val` (extract `c`).
      4. After 3-fold decomposition, `hSub h s = H_s(a, b)`, `hSub h t = H_t(a, c)`.
      5. Fubini twice: `∫_b ∫_c H_s(a,b) H_t(a,c) = (∫_b H_s) · (∫_c H_t)`.
      6. Identify both inner integrals with `kernelProjection m k h ν a` via `h_symm`.
      7. Pull `a` back through `Fin k ≃ s ∩ t`.
    mathlib_upgrade_trigger: []  # No Mathlib gap; pure engineering
    estimated_effort: ~150 LOC
    priority: high  # Unblocks `cov_hSub_eq_uZeta` + entire UStat CLT chain
    date_added: 2026-05-07

  - id: variance.ustatistic.hajek_remainder_var_tendsto_zero
    file: Statlean/Variance/UStatistic.lean
    line: 1335
    kind: helper
    category: R6_engineering
    math_content: |
      Hájek remainder variance bound: `n · Var(U_n − E[U_n] − T_n) → 0` as
      `n → ∞`, where `T_n = hajekProjection m hm h ν n`. Expand via
      `u_statistic_variance_decomposition` (k = 1 leading term cancels with
      Hájek variance `m² ζ_1 / n`; residual `k ≥ 2` terms decay like
      `O(n⁻¹)`).
    citation: Serfling 1980 §5.3.4 (Hájek projection); Hájek (1968).
    blocker: |
      Depends transitively on `integral_hSub_mul_hSub` (axiomatized).
      Plus: Mathlib lacks asymptotic combinatorial bounds for
      `C(n,m)⁻¹ · C(m,k) · C(n-m, m-k)` at fixed `k, m`.
    replacement_path: |
      1. Discharge `integral_hSub_mul_hSub` (engineering).
      2. Build `Nat.binomial_ratio_tendsto` API for `C(m,k) C(n-m,m-k) / C(n,m) ~ k!/(n^k)`.
      3. Telescope the variance decomposition; bound `k ≥ 2` terms by `n⁻¹`.
    mathlib_upgrade_trigger:
      - "Mathlib.Combinatorics.Binomial.Asymptotics (binomial coefficient ratios)"
    estimated_effort: ~200 LOC (after `integral_hSub_mul_hSub` is in)
    priority: med
    date_added: 2026-05-07

  - id: variance.ustatistic.ustatistic_clt_degenerate
    file: Statlean/Variance/UStatistic.lean
    line: 1892
    kind: main
    category: R6_API_gap
    math_content: |
      Shao Thm 3.5(ii): in the degenerate regime `ζ₁ = 0, ζ₂ > 0`, the
      centered + n-rescaled U-statistic `n(U_n - E U_n)` converges in
      distribution to `Y` with `EY = 0`, `EY² = m²(m−1)²ζ₂/2`. Limiting law
      is `(m(m−1)/2) Σ_j λ_j (χ²_{1j} − 1)` with `Σ λ_j² = ζ₂`.
    citation: Shao, *Mathematical Statistics* Thm 3.5(ii); Serfling 1980 §5.5.2.
    blocker: |
      Mathlib 4.28 lacks (a) chi-square distribution moments
      (`E[χ²(d)] = d`, `Var[χ²(d)] = 2d`), (b) convergence theory for
      infinite series of independent non-Gaussian RVs (Skorokhod /
      Khinchin–Kolmogorov three-series).
    replacement_path: |
      1. Land `ProbabilityTheory.chiSquared` moments in Mathlib.
      2. Build infinite-series convergence (Khinchin–Kolmogorov) for
         independent non-Gaussian summands.
      3. Apply Lévy continuity to identify the limit law.
    mathlib_upgrade_trigger:
      - "ProbabilityTheory.chiSquared_mean (E[χ²(d)] = d)"
      - "ProbabilityTheory.chiSquared_variance (Var[χ²(d)] = 2d)"
      - "Mathlib.Probability.Series.KhinchinKolmogorov (three-series)"
    estimated_effort: ~300 LOC
    priority: low  # Blocked on Mathlib χ² infrastructure
    date_added: 2026-05-07

  - id: variance.ustatistic.ustatistic_degenerate_partial_sum_sq_moment
    file: Statlean/Variance/UStatistic.lean
    line: 1940
    kind: helper
    category: R6_API_gap
    math_content: |
      Closed-form second moment of the partial spectral sum
      `Yₖ = (m(m−1)/2) Σ_{j<k} λ_j (X_j − 1)` where `X_j` are iid χ²₁:
      `E[Yₖ²] = (m²(m−1)²/2) · Σ_{j<k} λ_j²`. Direct computation from
      `E[χ²₁ − 1] = 0`, `Var[χ²₁] = 2`, and independence.
    citation: Same as `ustatistic_clt_degenerate` (Shao p.196).
    blocker: |
      Mathlib lacks chi-square moments. Once `chiSquared_mean` and
      `chiSquared_variance` land, the proof is direct
      (~30 LOC: linearity + independence).
    replacement_path: |
      1. Apply `chiSquared_mean 1 = 1`, `chiSquared_variance 1 = 2`.
      2. Expand `(Σ_{j<k} λⱼ(Xⱼ − 1))²` via independence (cross-terms vanish).
      3. Linearity of integral.
    mathlib_upgrade_trigger:
      - "ProbabilityTheory.chiSquared_mean (E[χ²(d)] = d)"
      - "ProbabilityTheory.chiSquared_variance (Var[χ²(d)] = 2d)"
    estimated_effort: ~30 LOC (post-chiSquared API)
    priority: med  # Quick win once chi-square API lands
    date_added: 2026-05-07

# ---------------------------------------------------------------------------
# AsymptoticExpectation — Khinchin convergence-of-types blocker
# ---------------------------------------------------------------------------

  - id: limittheorems.asymptoticexpectation.shao_prop_2_3_case_both_nondeg
    file: Statlean/LimitTheorems/AsymptoticExpectation.lean
    line: 317
    kind: main
    category: R6_genuine
    math_content: |
      Khinchin's convergence-of-types theorem (special case of Shao
      Prop 2.3 / Exercise 1.129): if `Xₙ →d X` and `aₙXₙ + bₙ →d Y` with
      `X, Y` both non-degenerate, then `aₙ → a > 0`, `bₙ → b ∈ ℝ`, and
      `Y = aX + b` in distribution.
    citation: |
      Shao, *Mathematical Statistics*, Exercise 1.129;
      Khinchin (1937), *Limit Distributions for Sums of Independent RVs*;
      Gnedenko–Kolmogorov 1954, §10.
    blocker: |
      Mathlib lacks (a) tightness of `{aₙ}, {bₙ}` from non-degeneracy +
      Prokhorov, (b) Helly extraction in `[0,∞]`, (c) sub-sequence
      uniqueness via charFun + Lévy continuity (latter IS in Mathlib).
    replacement_path: |
      1. Tightness of `{aₙ}, {bₙ}` from non-degeneracy + Prokhorov.
      2. Helly extraction along subsequences in `[0,∞]` (we have a partial
         version in `case_ii` sub-case D).
      3. Sub-sequence uniqueness via characteristic functions + `levy_continuity`.
      4. Pass-to-limit using `tendstoInDistribution` Slutsky stability.
    mathlib_upgrade_trigger:
      - "Mathlib.MeasureTheory.Measure.Tight.Prokhorov (Prokhorov for ℝ-valued seq)"
      - "Mathlib.Analysis.Helly.ExtendedReals (Helly selection in [0,∞])"
    estimated_effort: ~400 LOC
    priority: med
    date_added: 2026-05-07

