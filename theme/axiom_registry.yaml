  - id: dro.wasserstein.mohajerin_esfahani_kuhn_duality
    file: Statlean/DRO/Wasserstein.lean
    line: 58
    kind: main
    category: R6_genuine
    math_content: |
      MEK 2018 Thm 1: for an `L`-Lipschitz loss on a Wasserstein-1 ball of
      radius `ρ`, `sup_{ν ∈ W_ρ(μ)} E_ν[ℓ] = E_μ[ℓ] + ρ · L`. Direct from
      Kantorovich–Rubinstein duality applied to the Lipschitz dual.
    citation: |
      Mohajerin Esfahani–Kuhn (2018), *Math. Programming* 171:115–166,
      "Data-driven distributionally robust optimization", Thm 1.
    blocker: |
      Mathlib 4.28 lacks (a) Kantorovich–Rubinstein duality theorem,
      (b) Lipschitz extension machinery (Kirszbraun / McShane on metric
      spaces).
    replacement_path: |
      1. Land Kantorovich–Rubinstein duality
         (`Mathlib.MeasureTheory.OptimalTransport.KantorovichRubinstein`).
      2. McShane-Whitney extension on metric spaces.
      3. Combine: rebalance the dual using the Lipschitz extension.
    mathlib_upgrade_trigger:
      - "Mathlib.MeasureTheory.OptimalTransport.KantorovichRubinstein"
      - "Mathlib.Topology.MetricSpace.LipschitzExtension (McShane-Whitney)"
    estimated_effort: ~300 LOC (after Mathlib has KR duality)
    priority: low
    date_added: 2026-05-07

