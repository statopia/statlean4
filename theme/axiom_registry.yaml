      when `d ≥ 3`.
    replacement_path: |
      1. Land Stein's identity in Mathlib (basic case: `f : ℝ^d → ℝ` smooth,
         `E[(X - θ) f(X)] = E[∇f(X)]` for `X ~ N(θ, I)`).
      2. Compute `E[1/‖Y‖²]` via polar coordinates + chi-square density
         (~50 LOC after χ² API).
      3. Plug into James–Stein risk formula.
    mathlib_upgrade_trigger:
      - "Mathlib.Probability.Stein.Identity (Gaussian Stein IBP)"
      - "Mathlib.Probability.Distributions.ChiSquared.Reciprocal (E[1/χ²(d)])"
    estimated_effort: ~250 LOC
    priority: med
    date_added: 2026-05-07

