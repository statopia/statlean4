    frequency: 3

  - trigger: "linarith loses < in ≤+< chains"
    tip: "Use add_lt_add_of_le_of_lt explicitly instead"
    frequency: 2

  - trigger: "∫ (g')²/g dμ where g = f² (Fisher information of square)"
    tip: "I(f²) = ∫(2ff')²/f² = 4∫(f')². Lean 0/0=0 makes f=0 case automatic — no need for hf_ne_zero hypothesis. Use div_self_sqrt or direct field_simp."
    frequency: 1

  - trigger: "∀ᵐ y ∂ν, P(y) → ∀ᵐ z ∂(μ.prod ν), P(z.2)"
    tip: "Use Measure.prod_prod_le: show {z | ¬P z.2} ⊆ univ ×ˢ {y | ¬P y}, bound (μ.prod ν)(univ ×ˢ S) ≤ μ(univ) * ν(S) = 0. No measurability needed. See ae_snd_of_ae_marginal in LogSobolev.lean."
    frequency: 3

  - trigger: "∀ᵐ z ∂γn, P(z) → ∀ᵐ y ∂γⁿ⁺¹, P((e y).2) via piFinSuccAbove"
    tip: "Chain: prod_left_ae → ae_snd_of_ae_marginal (transfer to product) → QuasiMeasurePreserving.ae (transfer via e). Then .mono to rewrite predicate using Fin.update_insertNth."
    frequency: 3

  - trigger: "f ∈ L²(γ) implies f·poly ∈ L²(γ)?"
    tip: "FALSE! Counterexample exists. Use Hölder: L²·L² ⊆ L¹. Only claim L¹ for products."
    frequency: 1

  - trigger: "entropy_subadditivity for g·log(g) NOT integrable (Lean Bochner convention)"
    tip: "LIKELY FALSE under Lean's ∫=0 convention for non-integrable functions. When g·log(g) ∉ L¹, entropyPi = -(∫g)·log(∫g) can be positive, but ∑∫condEnt_i could be 0 (each condEntropyAt non-integrable → Lean ∫ = 0). Eliminate this case split; use Integrable(g·log g) as hypothesis instead."
    frequency: 1

  - trigger: "Gaussian product independence IndepFun Prod.fst Prod.snd"
    tip: "indepFun_iff_map_prod_eq_prod_map_map + Measure.map_fst_prod + Measure.map_snd_prod + measure_univ"
    frequency: 1

  - trigger: "NNReal coercion lipschitzWith_of_nnnorm_deriv_le"
    tip: "Set Cnn : NNReal := ⟨C, hC_nn⟩ and prove (Cnn : ℝ) = C := rfl. Then in the nnnorm bound: rw [← NNReal.coe_le_coe, coe_nnnorm, hCnn_eq, (hg_deriv x).deriv]; exact hC x"
    frequency: 1

  - trigger: "ae_map_iff requires MeasurableSet use ae_of_ae_map instead"
    tip: "ae_map_iff needs MeasurableSet {x | p x}. Use ae_of_ae_map instead — it takes AEMeasurable f μ and ∀ᵐ y ∂(map f μ), p y, returns ∀ᵐ x ∂μ, p (f x), with no measurability requirement on the predicate set."
    frequency: 1

  - trigger: "ouSemigroup nonnegativity t=0 only ae not pointwise"
    tip: "ouSemigroup 0 g x = g x. If g ≥ 0 only ae(γ), cannot prove g x ≥ 0 for all x. Use ae statements: filter_upwards [hg_nn] with x hx; rw [ouSemigroup_zero]; exact hx."
    frequency: 1

  - trigger: "nlinarith abs |z| ≤ 1 + z²"
    tip: "nlinarith can't handle abs directly. Use: have h := sq_nonneg (|z| - 1); have := sq_abs z; have := abs_nonneg z. Then nlinarith closes |z| ≤ 1 + z²."
    frequency: 1

  - trigger: "exp(-s)^2 = exp(-2s) in Lean"
    tip: "rw [sq, ← Real.exp_add]; congr 1; ring"
    frequency: 1

  - trigger: "ae quantifier swap"
    tip: "Do NOT try to prove MeasurableSet directly when functions are only AEStronglyMeasurable. Use .mk proxy approach instead."
    frequency: 1

  - trigger: "integral_map argument order"
    tip: "integral_map takes AEMeasurable f μ first, then AEStronglyMeasurable g (μ.map f)"
    frequency: 1

  - trigger: "memLp_map_measure_iff needs AEStronglyMeasurable for composed function"
    tip: "memLp_map_measure_iff requires AEStronglyMeasurable g (μ.map f), not f, and returns ↔ for MemLp (g∘f)"
    frequency: 1

  - trigger: "variance_map pattern matching"
    tip: "DO NOT try rw [← variance_map] — Lean won't match f against id∘f. Use have := (variance_map ...).symm instead."
    frequency: 1

  - trigger: "Converting `μ S ≤ ENNReal.ofReal r` to `.toReal` inequality when goal is in ℝ"
    tip: "Use `rw [← ENNReal.toReal_ofReal hr]` then `exact (ENNReal.toReal_le_toReal (measure_ne_top μ _) ENNReal.ofReal_ne_top).mpr h` to bridge an ENNReal ≤ ENNReal hypothesis into a Real ≤ Real goal."

  - trigger: "need nonnegativity of a Bochner/Lebesgue integral over an arbitrary measure"
    tip: "Prefer `integral_nonneg_of_ae` (takes an ae hypothesis `0 ≤ᵐ[μ] f`) over `integral_nonneg` (requires pointwise `∀ x, 0 ≤ f x`). Use the ae variant whenever the hypothesis is already phrased almost-everywhere."

  - trigger: "Searching Mathlib for IsBoundedInProbability or stochastic order O_P notation"
    tip: "IsBoundedInProbability, IsNegligibleInProbability, and ConvergesInProbability are NOT in Mathlib — they are defined in Statlean.EmpiricalProcess.StochasticOrder. Always import that module and search there, not via grep_api on Mathlib."

  - trigger: "need to rearrange additive group expression (e.g., a + b - c = (a - c) + b) in a type that is SeminormedAddCommGroup / AddCommGroup but not necessarily a CommRing"
    tip: "Use `abel` instead of `ring` for additive rearrangements. `ring` requires a (semi)ring structure; `abel` works for any additive commutative group and handles sub/add permutations correctly."

  - trigger: "goal of the form `a ^ n ≤ b ^ n` with `0 ≤ a` and `a ≤ b`"
    tip: "Use `pow_le_pow_left₀` (not `pow_le_pow_left`) in Mathlib v4.28+. The rename dropped the unprimed name; `exact pow_le_pow_left₀ ha hab n` closes the goal directly."

  - trigger: "Searching Mathlib for Cauchy-Schwarz over Finset (finite sum) — common name guesses fail"
    tip: "The correct Mathlib name is `Real.sum_mul_le_sqrt_mul_sqrt` (not `inner_mul_le_norm`, `Finset.inner_mul_le_norm`, `abs_inner_le_norm`, or `sum_mul_sq_le_sq_mul_sq`). Also note `Finset.sum_mul_sq_le_sq_mul_sq` exists but has different (semiring) hypotheses. Use `grep_api` pattern `sum_mul_le_sqrt` to locate it quickly."

  - trigger: "need to bound f(x) ≤ g(x) on an interval using derivative comparison"
    tip: "The lemma `image_le_of_deriv_right_le_deriv_boundary` does NOT exist in Mathlib. The correct approach is: define h = g - f, show `antitoneOn_of_deriv_nonpos` does not apply directly either — instead use `monotoneOn_of_deriv_nonneg` on (g - f) or show AntitoneOn on f - g, then evaluate at the left boundary to get f(a) ≤ g(a) and propagate."

  - trigger: "searching for a 'comparison via derivatives on an interval' lemma in Mathlib"
    tip: "Avoid grep-searching for `image_le_of_*`, `deriv.*boundary`, `le_of_hasDerivAt`, `sub_le_of_hasDerivAt`, or `norm_sub_le_of_le_deriv` — none of these patterns exist in current Mathlib. The canonical API for interval-monotonicity from derivatives is: `monotoneOn_of_deriv_nonneg` (ConvexDomain, ContinuousOn, deriv ≥ 0 on interior → MonotoneOn), `antitoneOn_of_deriv_nonpos` (same shape, nonpos → AntitoneOn), `strictMonoOn_of_deriv_pos`."

  - trigger: "Need to rewrite ∫ f d(Measure.pi μ) over Fin (n+1) as iterated integral (one coordinate + rest)"
    tip: "There is no `integral_fin_succ` lemma in Mathlib. The correct route is: (1) apply `MeasurePreserving.integral_comp` using `measurePreserving_piFinSuccAbove` to change variables, then (2) convert to iterated integral via `MeasureTheory.integral_prod`. The map `piFinSuccAbove` is measure-preserving but you also need `MeasurableEmbedding` — supply it via the underlying `MeasurableEquiv` (`.measurableEmbedding` or `.toMeasurableEmbedding`)."

  - trigger: "Using `MeasurePreserving.integral_comp` when the underlying map is a `MeasurableEquiv`"
    tip: "`MeasurePreserving.integral_comp` has signature `MeasurePreserving f μ ν → MeasurableEmbedding f → ∀ g, ∫ x, g (f x) ∂μ = ∫ y, g y ∂ν`. When f comes from a `MeasurableEquiv` e, supply `e.measurableEmbedding` (or `MeasurableEquiv.toMeasurableEmbedding`) as the second argument."

  - trigger: "Need to rewrite integral under a MeasurePreserving map"
    tip: "Use `MeasurePreserving.integral_comp` which has signature: `MeasurePreserving f μ ν → MeasurableEmbedding f → ∀ (g : β → G), ∫ x, g (f x) ∂μ = ∫ y, g y ∂ν`. Note it requires BOTH MeasurePreserving AND MeasurableEmbedding. For equivalences, you may need to extract the MeasurableEmbedding from the MeasurableEquiv. Also available: `MeasurePreserving.lintegral_comp` and `MeasurePreserving.lintegral_comp_emb` for ℝ≥0∞-valued integrals."

  - trigger: "Searching for Gaussian integration-by-parts or Stein's lemma in the project"
    tip: "The StatLean project has `stein_identity` (C¹ functions), `stein_identity_of_lipschitz` (Lipschitz functions), and `gaussian_ibp_coord` (multi-dimensional IBP for `stdGaussianPi`) in `Statlean/Gaussian/Stein.lean`. Search with pattern `stein|gaussian.*ibp|gaussian_ibp_coord` rather than `integral_mul_gaussian` to find these."

  - trigger: "Filter.Tendsto or MeasureTheory identifiers not resolving in a Lean 4 file (autoImplicit treating them as unknown variables)"
    tip: "When Lean reports 'The identifier `Tendsto` is unknown, and Lean's `autoImplicit` option causes an unknown identifier to be treated as an implicitly bound variable', add `open Filter MeasureTheory` (or `open scoped`) at the top of the section/file. The autoImplicit trap means missing opens silently create bogus implicit variables instead of giving a 'unknown identifier' error."

  - trigger: "check_type call fails with 'Unknown constant MeasureTheory.Measure.withDensity_apply'"
    tip: "The correct name is `MeasureTheory.withDensity_apply`, NOT `MeasureTheory.Measure.withDensity_apply`. The lemma lives in the root `MeasureTheory` namespace, not under `Measure`. Signature: `MeasurableSet s → (μ.withDensity f) s = ∫⁻ a in s, f a ∂μ`."

  - trigger: "Need to unfold or work with `TendstoInMeasure μ f l g` in terms of norm"
    tip: "Use `MeasureTheory.tendstoInMeasure_iff_norm` which rewrites `TendstoInMeasure μ f l g` as `∀ ε > 0, Tendsto (fun i => μ {x | ε ≤ ‖f i x - g x‖}) l (nhds 0)`. This is the correct iff characterization in Mathlib for seminormed groups."

  - trigger: "MeasurableSpace Ω instance synthesis failure when using probability measure P in a snippet check"
    tip: "When check_snippet or extract_goal fails with `failed to synthesize instance MeasurableSpace Ω`, add `[MeasurableSpace Ω] [MeasureProbabilitySpace Ω]` (or `IsProbabilityMeasure`) as explicit variable declarations above the theorem, or open a `variable` block. The issue is that Ω is abstract and Lean cannot infer its measurable structure without an explicit instance."

  - trigger: "Need sSup {a} = a in a ConditionallyCompleteLattice (e.g., ℝ)"
    tip: "Use csSup_singleton, not sSup_singleton. The latter does not exist in Mathlib; the former has signature @csSup_singleton : ∀ {α} [ConditionallyCompleteLattice α] (a : α), sSup {a} = a."

  - trigger: "simp_rw fails to rewrite an eta-reduced function application (e.g., supNormDiff A n) inside a larger goal"
    tip: "simp_rw cannot rewrite under eta-reduced terms when the function head is opaque. Instead, use show to introduce an explicit lambda, or unfold the definition manually with unfold/simp only [...], before rewriting."

  - trigger: "Need (fun x => c) '' s = {c} for a nonempty set s"
    tip: "Use Set.Nonempty.image_const (applied as hne.image_const c), not the non-existent Set.image_const. Signature: s.Nonempty → ∀ (a : β), (fun _ => a) '' s = {a}."

  - trigger: "structure field or integral expression contains ℝ≥0∞ and triggers 'expected token' at column ~28-30"
    tip: "Replace ℝ≥0∞ with ENNReal everywhere in the file (they are definitionally equal). The Unicode sequence ℝ≥0∞ is sometimes tokenized as ℝ≥0 (NNReal) + a stray ∞ token inside complex expressions, producing 'expected token' or 'failed to synthesize LE Type' errors. Adding 'open ENNReal' at the top reinforces this."

  - trigger: "∀ r ∈ ({0, 1, 2} : Set ℕ) inside a theorem statement causes 'expected token' parse error"
    tip: "Lean's parser misreads {0, 1, 2} after ∈ as an implicit binder. Rewrite as '∀ r : ℕ, r ∈ ({0, 1, 2} : Set ℕ) →' or factor the finite set into a local def/let before the ∀."

  - trigger: "`by omega` inside a Fin bound proof when `N` is an existential or local `ℕ` variable without explicit linear arithmetic hypotheses in context"
    tip: "`omega` requires explicit linear arithmetic facts visible in the local context. When constructing `Fin N` elements where `N` comes from an existential (`∃ N, ...`), omega has no usable constraints. Use `Nat.pos_of_ne_zero` / `Nat.zero_lt_succ` or restate the hypothesis explicitly, or use `norm_num` / `positivity` instead."

  - trigger: "`one_ne_top` used without namespace in ENNReal context"
    tip: "Use `ENNReal.one_ne_top` (fully namespaced). The bare identifier `one_ne_top` is unknown in Lean 4 / Mathlib 4."

  - trigger: "Need to bound `(μ S).toReal ≤ 1` for a probability measure"
    tip: "Use `prob_le_one` (type: `μ S ≤ 1` in ENNReal) then convert: `(ENNReal.toReal_le_toReal (measure_ne_top μ S) ENNReal.one_ne_top).mpr prob_le_one` followed by `ENNReal.toReal_one`. Do NOT use the non-existent `ENNReal.toReal_le_one`."

  - trigger: "`field_simp` followed by `ring` causes 'No goals to be solved' error"
    tip: "`field_simp` often closes the goal entirely (especially for simple algebraic identities over fields). Adding `ring` after it will error with 'No goals to be solved'. Use `field_simp` alone, or guard with `try ring`."

  - trigger: "absolute value notation `|expr|` used inside or near set-builder notation `{... | ...}`"
    tip: "Replace `|expr|` with `abs expr` (or `‖expr‖` for norms) when the pipe character conflicts with set-builder syntax. Lean 4 parser treats `|` as the set-builder separator, producing 'unexpected token >' or similar parse errors."

  - trigger: "unexpected `∫ g ∂ν = 0` for nonneg but non-integrable real-valued g in Bochner integral"
    tip: "Mathlib's real Bochner integral DEFINES `∫ g ∂ν = 0` when g is not μ-integrable, regardless of sign. Hypothesis `Integrable f (μ.prod ν)` (L¹) does NOT imply `Integrable (fun ω ↦ ∫ s, ‖f ω s‖² ∂ν) μ`. For L²-flavored bounds that reference `∫ ‖f‖²`, you must strengthen to `MemLp f 2` (or equivalently integrable_sq), otherwise RHS can silently collapse to 0 on non-L² slices, making pointwise-in-ω chains fail."

  - trigger: "goal says `tendsto_abs_nhds_zero_iff` — name wrong"
    tip: "correct Mathlib name is `tendsto_zero_iff_abs_tendsto_zero` (r → 0 ↔ |r| → 0)"
    frequency: 1

  - trigger: "need lintegral_const_mul but no measurability"
    tip: "use MeasureTheory.lintegral_const_mul' which only requires r ≠ ⊤ (NOT measurability of f)"
    frequency: 1

  - trigger: "ENNReal.ofReal (Real.exp x)^n goal"
    tip: "rw [← ENNReal.ofReal_pow (Real.exp_nonneg _), sq, ← Real.exp_add]; ring_nf"
    frequency: 1

  - trigger: "positivity fails on `2 / A.c_tail` with c_tail : field element"
    tip: "positivity can't see through structure access; name hypothesis `have hc := A.hc_pos` first, then positivity sees h2_over_c_pos via have h2_over_c_pos : 0 < 2 / A.c_tail := by positivity"
    frequency: 1

  - trigger: "need Real.exp (-2 * Real.log x) = x⁻¹ * x⁻¹"
    tip: "rewrite -2 * log x = log x⁻¹ + log x⁻¹ via `rw [Real.log_inv]; ring`; then exp_add + exp_log (needs positivity of x)"
    frequency: 1

  - trigger: "AEStronglyMeasurable of exp(η * T x - ζ η)"
    tip: "hT_meas.const_mul η |>.sub measurable_const |>.exp |>.aestronglyMeasurable"
    frequency: 1

  - trigger: "I_Q * V^2 = V with V nonzero implies I_Q = V inv"
    tip: "mul_right_cancel₀ drops one V → I_Q*V=1 → eq_inv_of_mul_eq_one_left"
    frequency: 1

  - trigger: "eq_inv_of_mul_eq_one_left vs right direction"
    tip: "_left a*b=1 ⟹ a=b⁻¹ (LHS becomes inverse); _right ⟹ b=a⁻¹ (RHS becomes inverse). Pick the right variant; don't add mul_comm."
    frequency: 1

  - trigger: "by_contra + push_neg fails on `ω ∉ {ω | ∃ x, p x ω}`"
    tip: "use `simp only [Set.mem_setOf_eq, not_exists, not_le] at hbad` instead of push_neg — the latter doesn't unfold setOf membership"
    frequency: 1

  - trigger: "Tendsto const_mul without open Filter"
    tip: "Use dot notation h.const_mul c. NOT apply Tendsto.const_mul (unknown without open Filter namespace)."
    frequency: 1

  - trigger: "Integrable mul constant function"
    tip: "Use hg.const_mul c. NOT (integrable_const c).mul hg — fails because integrable_const returns And, not Integrable."
    frequency: 1

  - trigger: "ENNReal div cancel phi numerator denominator"
    tip: "ENNReal mul_div_mul_right: a * phi / (b * phi) = a / b when phi ne 0 and phi ne top"
    frequency: 1

  - trigger: "noncomputable def funext proof simp fails"
    tip: "unfold noncomputable def before funext proof — simp only makes no progress on noncomputable defs"
    frequency: 1

  - trigger: "axiom in section with section variables"
    tip: "Lean 4 axiom in section: allowed, section variables auto-inserted into axiom signature. Use single docstring immediately before axiom (no consecutive docstrings)."
    frequency: 1

  - trigger: "ENNReal mul_lt_mul_left fails to synthesize for ℝ"
    tip: "DO NOT use mul_lt_mul_left for ℝ (needs MulRightStrictMono). Use mul_lt_mul_of_pos_left instead."
    frequency: 2

  - trigger: "Need ENNReal a + b < 1 with a, b ≤ 1/3"
    tip: "Compute 1/3 + 1/3 = 2/3 via ENNReal.div_add_div_same + norm_num. Then 2/3 < 1 via ENNReal.div_lt_iff with Or.inl Or.inl. Avoid div_lt_div_iff (doesn't exist for ENNReal)."
    frequency: 2

  - trigger: "abs_add unknown identifier in Mathlib (Lean 4)"
    tip: "DO NOT use abs_add. Use abs_add_le instead (gives |a + b| ≤ |a| + |b|)."
    frequency: 2
