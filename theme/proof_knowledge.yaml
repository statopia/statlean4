# L2 — API 链路（Mathlib 引理串联方案）
# ═══════════════════════════════════════════
L2_api_chains:

  # --- condExp 链路 ---
  - trigger: "pullout m-measurable factor from condExp"
    chain: "condExp_mul_of_aestronglyMeasurable_left (needs AEStronglyMeasurable[m] + both Integrable)"
    source: [Factorization, LehmannScheffe]
    confidence: 5

  - trigger: "tower property ∫ E[f|m] = ∫ f"
    chain: "integral_condExp hm_le (needs hm : m ≤ m₀, Integrable f)"
    source: [Basu, LehmannScheffe, RaoBlackwell]
    confidence: 5

  - trigger: "setIntegral characterization of condExp"
    chain: "setIntegral_condExp hm hf_int hs (needs MeasurableSet[m] s)"
    source: [Factorization, Basu]
    confidence: 5

  - trigger: "condExp of m-measurable function = itself"
    chain: "condExp_of_stronglyMeasurable hG hYm hYint → rw/simp"
    source: [RaoBlackwell]
    confidence: 5

  - trigger: "E[f|m] ae-nonneg from f ae-nonneg"
    chain: "condExp_nonneg (ae_of_all _ fun x => <bound>)"
