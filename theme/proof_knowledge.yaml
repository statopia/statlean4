# theme/proof_knowledge.yaml — 四层证明知识库
# 使用方法：按 trigger 字段匹配当前 goal，读对应 strategy/chain/tip
# 维护：成功证明后由 scripts/ingest_knowledge.py 自动入库
# API 签名查询：
#   Mathlib API  → grep theme/mathlib_api_index.md 或 theme/mathlib_full_type_index.tsv
#   StatLean API → grep theme/statlean_api_index.tsv (614 declarations, gen by scripts/gen_statlean_index.py)
#
# 负面 pattern 约定：
#   anti: true 表示"不要走这条路"。agent 查到 anti 条目时应跳过该策略。
#   可出现在 L3 (strategy), L2 (chain), L1 (tip) 任何层级。
#   已有的 "FALSE LEMMA 警告" 也属于此类。
version: v3
entry_count: 82

# ═══════════════════════════════════════════
# L3 — 证明策略（按 goal 形状索引）
# ═══════════════════════════════════════════
L3_strategies:

  # --- 不等式 / 界 ---
  - trigger: "Var[X] ≥ ... or ∫ f ≤ ∫ g (variance/integral inequality)"
    strategy: "正交分解 / completing-the-square / Cauchy-Schwarz → linarith [step1..stepN]"
    key_api: [integral_nonneg, sq_nonneg, inner_mul_le_norm_mul_nnorm]
    source: [ANOVA, RaoBlackwell, LehmannScheffe]
    confidence: 5

  - trigger: "‖a - b‖ ≤ C (norm inequality via intermediate steps)"
    strategy: "calc chain: triangle ‖A-C‖+‖C-B‖ via norm_add_le, then gcongr/linarith"
    key_api: [norm_add_le, norm_sub_le, gcongr]
    source: [USLLN, Taylor]
    confidence: 5

  - trigger: "0 ≤ ∫ f dμ (nonnegativity of integral)"
    strategy: "integral_nonneg + pointwise bound (sq_nonneg, mul_self_nonneg)"
    key_api: [integral_nonneg, integral_nonneg_of_ae, sq_nonneg]
    source: [RaoBlackwell, LehmannScheffe]
    confidence: 5

  # --- ae 等式 ---
  - trigger: "f =ᵐ[μ] condExp m f (ae equality with condExp)"
    strategy: "ae_eq_condExp_of_forall_setIntegral_eq: prove (1) IntegrableOn, (2) ∫_s h = ∫_s f for m-meas s, (3) AEStronglyMeasurable[m]"
    key_api: [ae_eq_condExp_of_forall_setIntegral_eq, setIntegral_condExp, stronglyMeasurable_condExp]
    source: [Factorization]
    confidence: 5

  - trigger: "P[P[f|M]|N] =ᵐ P[P[f|N]|M] (condExp commutativity)"
    strategy: "Integrable.ae_eq_of_forall_setIntegral_eq → MeasurableSpace.induction_on_inter on π-system → independence + pullout + tower"
    key_api: [induction_on_inter, iIndepFun, condExp_mul_of_aestronglyMeasurable_left]
    source: [EfronStein]
    confidence: 4

  # --- 唯一性 ---
  - trigger: "f =ᵐ g from unbiased + completeness"
    strategy: "差 = 0 → 完备性/零测集: integral_sub + sub_self + completeness"
    key_api: [integral_sub, condExp_of_stronglyMeasurable]
    source: [LehmannScheffe]
    confidence: 4

  # --- 因子分解 ---
  - trigger: "f = g ∘ T (factorization through statistic)"
    strategy: "Doob-Dynkin: StronglyMeasurable[m_T].measurable.exists_eq_measurable_comp → obtain ⟨h, hh_meas, hψ_eq⟩"
    key_api: [exists_eq_measurable_comp, comap_measurable, StandardBorelSpace]
    source: [Factorization, Basu, LehmannScheffe]
    confidence: 5

  # --- 积分等式 ---
  - trigger: "∫ f dμ = ∫ g dμ (integral equality)"
    strategy: "integral_congr_ae for pointwise → tower/pullout for condExp chains"
    key_api: [integral_congr_ae, integral_condExp, condExp_mul_of_aestronglyMeasurable_left]
    source: [Factorization, ANOVA, Basu]
    confidence: 5

  # --- 可积性链 ---
  - trigger: "Integrable f μ or MemLp f p μ (integrability)"
    strategy: "L^p chain: MemLp q → MemLp p via mono_exponent (p≤q), or memLp_two_iff_integrable_sq for L²↔sq"
    key_api: [MemLp.mono_exponent, memLp_two_iff_integrable_sq, Integrable.of_bound]
    source: [Taylor, ANOVA, LehmannScheffe]
    confidence: 5

  # --- Fubini at arbitrary coord (piFinSuccAbove) ---
  - trigger: "Integrable (fun y => ∫ t, φ(update y j t) dμ) (stdGaussianPi n)"
    strategy: "piFinSuccAbove decomposition: e := MeasurableEquiv.piFinSuccAbove j, hmp.symm.integrable_comp_of_integrable → hprod.integral_prod_right → .comp_snd → hmp.integrable_comp_of_integrable. Key identity: update y j t = e.symm (t, (e y).2) via Fin.update_insertNth."
    key_api: [MeasurableEquiv.piFinSuccAbove, measurePreserving_piFinSuccAbove, Integrable.integral_prod_right, Integrable.comp_snd, MeasurePreserving.integrable_comp_of_integrable, Fin.update_insertNth]
    source: [LogSobolev]
    confidence: 5

  # --- condEntropyAt integrability (Jensen domination) ---
  - trigger: "Integrable (fun x => condEntropyAt μ g j x) (stdGaussianPi n)"
    strategy: "Unfold condEntropyAt = A - B. A integrable by Fubini (integrable_condExpect_stdGaussianPi_gen). B = (E_j g)·log(E_j g) dominated by |A| + 1/e: Jensen upper (convexOn_mul_log.map_integral_le, needs ae slice integrability via prod_left_ae + ae_snd_of_ae_marginal + QuasiMeasurePreserving.ae), lower -1/e (mul_log_ge_neg_inv_exp). Then Integrable.mono'."
    key_api: [convexOn_mul_log, continuous_mul_log, Integrable.mono', mul_log_ge_neg_inv_exp, ae_snd_of_ae_marginal]
    source: [LogSobolev]
    confidence: 5

  # --- 测度相等 ---
  - trigger: "μ = ν on σ-algebra (measure equality)"
    strategy: "π-λ / 单调类: ext_of_generate_finite or induction_on_inter"
    key_api: [ext_of_generate_finite, induction_on_inter]
    source: [EfronStein]
    confidence: 4

  # --- 收敛 ---
  - trigger: "∫ F_n → ∫ F (dominated convergence for integrals)"
    strategy: "tendsto_integral_of_dominated_convergence: bound, F_n-measurability, bound-integrable, norm bound, pointwise limit"
    key_api: [tendsto_integral_of_dominated_convergence]
    source: [USLLN, Taylor]
    confidence: 5

  - trigger: "Continuous (θ ↦ ∫ f(x,θ) dμ) (continuity of parameter integral)"
    strategy: "continuous_of_dominated: F measurable, bound ae, bound integrable, F continuous in param"
    key_api: [continuous_of_dominated]
    source: [USLLN]
    confidence: 4

  - trigger: "aₙ(g(Xₙ)-g(c)) →ᵈ d·Y (delta method)"
    strategy: "Decompose aₙ(g(X)-g(c)) = d·W + R, W→ᵈY via continuous_comp, R→ᵖ0 via isLittleO + tightness"
    key_api: [tendstoInDistribution_of_tendstoInMeasure_sub, hasDerivAt_iff_isLittleO]
    source: [DeltaMethod]
    confidence: 4

  - trigger: "Wₙ →ᵈ Y implies tail P(|Wₙ|≥M)→0 (tightness)"
    strategy: "ProbMeasure extraction → tail decay via tendsto_measure_iInter → Portmanteau limsup → eventually_lt"
    key_api: [tendsto_measure_iInter_atTop, ProbabilityMeasure]
    source: [DeltaMethod]
    confidence: 4

  # --- 乘积空间 ---
  - trigger: "dimension reduction on product space (∀ i, X i) → ℝ"
    strategy: "restrict map + comap_iSup + Doob-Dynkin factoring + measurePreserving_piEquivPiSubtypeProd → induction"
    key_api: [comap_iSup, comap_comp, measurePreserving_piEquivPiSubtypeProd, integrable_map_measure]
    source: [EfronStein]
    confidence: 3

  - trigger: "∫∫ f d(μ×ν) Fubini order swap"
    strategy: "integral_integral_swap for iterated → integral_prod_symm for coord swap"
    key_api: [integral_integral_swap, integral_prod_symm, Integrable.prod_right_ae]
    source: [ANOVA]
    confidence: 4

  # --- 复分析 / charFun ---
  - trigger: "charFun (μ.map Y) t = ∫ exp(itY) dμ (characteristic function)"
    strategy: "charFun_apply_real + integral_map_of_stronglyMeasurable → push_cast; ring"
    key_api: [charFun_apply_real, integral_map_of_stronglyMeasurable, integral_complex_ofReal]
    source: [Taylor]
    confidence: 5

  # --- Entropy ---
  - trigger: "Ent(g) ≤ ∑_i ∫ condEnt_i(g) (entropy subadditivity)"
    strategy: "Telescoping: h_k = iterated E_k...E_0[g], chain rule + data processing (Jensen for x·log(x))"
    key_api: [entropy_chain_rule_pi]
    source: [LogSobolev]
    confidence: 3

  - trigger: "Ent_γ(f²) ≤ 2∫(f')² (Gaussian log-Sobolev inequality)"
    anti: true
    strategy: "DO NOT use Stein identity ∫xh dγ = ∫h' dγ. Stein gives Poincaré (Var ≤ ∫f'²) but NOT LSI, because entropy involves nonlinear x·log(x) which cannot be extracted from the linear Stein identity. Must use OU semigroup infrastructure (Bakry-Emery / hypercontractivity / two-point CLT)."
    key_api: []
    source: [LogSobolev, prove-deep-2026-03-11]
    confidence: 5

  # --- 有限覆盖 ---
  - trigger: "finite subcover of compact space"
    strategy: "isCompact_univ.elim_finite_subcover with open balls + covering proof"
    key_api: [isCompact_univ.elim_finite_subcover, isOpen_ball]
    source: [USLLN]
    confidence: 4

  # --- Variance 分解 ---
  - trigger: "Var[Y] = ∫ Var[Y|G] + Var[E[Y|G]] (law of total variance)"
    strategy: "Direct: integral_condVar_add_variance_condExp hG hY"
    key_api: [integral_condVar_add_variance_condExp, setIntegral_condVar]
    source: [RaoBlackwell]
    confidence: 5

  - trigger: "Var[X] = E[X²] - (E[X])² (variance expansion)"
    strategy: "variance_eq_sub hX_memLp2 then simp only [Pi.pow_apply]"
    key_api: [variance_eq_sub, Pi.pow_apply]
    source: [ANOVA, RaoBlackwell]
    confidence: 5

