    confidence: 5

  - trigger: "E[f|m] ≤ᵃᵉ E[g|m] from f ≤ᵃᵉ g"
    chain: "condExp_mono hf_int hg_int (ae_of_all _ fun x => ...)"
    source: [Factorization, Basu]
    confidence: 5

  - trigger: "AEStronglyMeasurable[m] for condExp"
    chain: "stronglyMeasurable_condExp.aestronglyMeasurable (or .mono hle for coarser σ-alg)"
    source: [Factorization, LehmannScheffe]
    confidence: 5

  - trigger: "MemLp condExp from MemLp f (L² contraction)"
    chain: "hf.condExp (MemLp.condExp preserves Lp membership)"
    source: [RaoBlackwell, LehmannScheffe]
    confidence: 5

  # --- 积分链路 ---
  - trigger: "∫ f ≤ ∫ g with integrability"
    chain: "integral_mono_ae h_f_int h_g_int (ae_of_all _ fun x => <bound>)"
    source: [Taylor, ANOVA, RaoBlackwell]
    confidence: 5

  - trigger: "∫ c * f = c * ∫ f"
    chain: "integral_const_mul (also integral_mul_const for f * c form)"
    source: [Hermite, Basu, ANOVA]
    confidence: 5

  - trigger: "∫ (f+g) = ∫ f + ∫ g or ∫ (f-g) = ∫ f - ∫ g"
    chain: "integral_add h1_int h2_int / integral_sub h1_int h2_int (explicit integrability!)"
    source: [LehmannScheffe, ANOVA, Taylor]
    confidence: 5

  - trigger: "lintegral rnDeriv finiteness for trimmed measure"
    chain: "lintegral_trim hle → Measure.lintegral_rnDeriv_le → trim_measurableSet_eq → ne_top_of_le_ne_top"
    source: [Factorization]
    confidence: 4

  - trigger: "Integrable rnDeriv.toReal • f ↔ Integrable f (change of measure)"
    chain: "integrable_rnDeriv_smul_iff hμ + setIntegral_rnDeriv_smul hμ hs"
    source: [Factorization]
    confidence: 4

  # --- 可积性链路 ---
  - trigger: "MemLp f p from MemLp f q where p ≤ q"
    chain: "hLp.mono_exponent (by norm_num : (p : ENNReal) ≤ q)"
    source: [Taylor]
    confidence: 5

  - trigger: "MemLp f 2 ↔ Integrable (f²)"
    chain: "memLp_two_iff_integrable_sq hf_aesm"
    source: [ANOVA, LehmannScheffe]
    confidence: 5

  - trigger: "Integrable f from uniform bound"
    chain: "Integrable.of_bound h_aesm C h_bound_ae"
    source: [Factorization]
    confidence: 4

  - trigger: "Integrable (f-g) or (f+g)"
    chain: "hf.sub hg / hf.add hg / hf.sub (integrable_const c)"
    source: [LehmannScheffe, ANOVA]
    confidence: 5

  - trigger: "Integrable gtil (P.map restrict) from Integrable (gtil∘restrict) P"
    chain: "integrable_map_measure hgtil_sm.aestronglyMeasurable hrestrict_meas.aemeasurable"
    source: [EfronStein]
    confidence: 3

  # --- 可测性链路 ---
  - trigger: "Measurable[comap T m] for functions factoring through T"
    chain: "comap_measurable T + .comp_measurable for g∘T; hT.comap_le for m_T ≤ mΩ"
    source: [Factorization, Basu]
    confidence: 5

  - trigger: "MemLp (f∘π) on product from MemLp f (measure-preserving)"
    chain: "hg_lp.comp_measurePreserving measurePreserving_snd/fst"
    source: [ANOVA]
    confidence: 4

  # --- ENNReal 链路 ---
  - trigger: "a.toReal = b.toReal ↔ a = b (ENNReal)"
    chain: "ENNReal.toReal_eq_toReal_iff' h_ne_top h_ne_top"
    source: [Factorization, Basu]
    confidence: 4

  - trigger: "μ s ≠ ⊤ for finite measure"
    chain: "measure_ne_top μ s (from IsFiniteMeasure)"
    source: [Factorization]
    confidence: 5

  # --- 收敛链路 ---
  - trigger: "ae finite intersection from countable family"
    chain: "ae_ball_iff (Finset.countable_toSet S) for ∀ᵐ ω, ∀ θ ∈ S, P ω θ"
    source: [USLLN]
    confidence: 4

  - trigger: "⨆ k, f k ≤ C from pointwise bound"
    chain: "ciSup_le (fun k => hf_le k) (needs BddAbove)"
    source: [USLLN]
    confidence: 4

  # --- 复数链路 ---
  - trigger: "‖exp(i·t·x)‖ = 1"
    chain: "Complex.norm_exp_ofReal_mul_I"
    source: [Taylor, Hermite]
    confidence: 5

  - trigger: "∫ (↑f : ℂ) dμ = ↑(∫ f dμ)"
    chain: "integral_complex_ofReal"
    source: [Taylor]
    confidence: 5

  # --- piFinSuccAbove Fubini 链路 ---
  - trigger: "Integrable (φ ∘ Prod.snd ∘ e) (stdGaussianPi n)"
    chain: "hmarg.comp_snd stdGaussian → hmp.integrable_comp_of_integrable. Where hmarg := hprod.integral_prod_right, hprod := hmp.symm.integrable_comp_of_integrable hφ."
    source: [LogSobolev]
    confidence: 5

  - trigger: "Function.update y j t = e.symm (t, (e y).2) (piFinSuccAbove identity)"
    chain: "conv_lhs => rw [(e.symm_apply_apply y).symm]; simp only [e, MeasurableEquiv.piFinSuccAbove_symm_apply]; exact @Fin.update_insertNth n (fun _ => ℝ) j (e y).1 t (e y).2"
    source: [LogSobolev]
    confidence: 5

  - trigger: "∀ᵐ y ∂γⁿ⁺¹, Integrable (fun t => g(update y j t)) γ (ae slice integrability)"
    chain: "hg_prod.prod_left_ae → ae_snd_of_ae_marginal γ₁ γn → hmp.quasiMeasurePreserving.ae → .mono (rewrite via Fin.update_insertNth)"
    source: [LogSobolev]
    confidence: 5

# ═══════════════════════════════════════════
# L1 — Tactic 技巧（常见坑和惯用法）
# ═══════════════════════════════════════════
L1_tactic_tips:

  # --- 高频 tactic ---
  - trigger: "∀ᵐ x ∂μ, P x (ae goal)"
    tip: "filter_upwards [h1, h2] with x hx1 hx2; <proof>. For pointwise: ae_of_all _ fun x => <proof>"
    frequency: 20

  - trigger: "assembling real inequality from named steps"
    tip: "linarith [step1, step2, ..., stepN] — dominant closer for ℝ inequalities"
    frequency: 20

  - trigger: "pure ring identity a = b"
    tip: "ring; or ext x; ring; or congr 1; ext x; ring"
    frequency: 20

  - trigger: "coercion goals ℕ→ℝ, ℤ→ℝ, ℝ→ℂ"
    tip: "push_cast; ring (push_cast [Nat.factorial_succ] for factorial)"
    frequency: 10

  - trigger: "numeric fact (2:ENNReal)≤3 or 0<4"
    tip: "by norm_num (inline as argument)"
    frequency: 15

  - trigger: "division / fractions / nonzero denom"
    tip: "field_simp [h_ne_zero]; ring"
    frequency: 8

  - trigger: "monotone inequality f a ≤ f b"
    tip: "gcongr (monotonicity tactic for norm, mul, pow etc.)"
    frequency: 8

  # --- Pi.apply 陷阱 ---
  - trigger: "(f^2) x ≠ f x^2 for Pi-functions"
    tip: "simp only [Pi.pow_apply] before ring/linarith. Same for Pi.sub_apply, Pi.mul_apply"
    frequency: 5

  # --- condExp 陷阱 ---
  - trigger: "lambda vs Pi form mismatch with condExp"
    tip: "Three fixes: (1) have h_eq : (fun ω => ...) = f - g := rfl; rw [h_eq] (2) change (3) filter_upwards + Pi.sub_apply"
    frequency: 5

  - trigger: "set m := MeasurableSpace.comap causes instance confusion"
    tip: "DON'T set m. Use explicit condExp m ν f. Inline MeasurableSpace.comap T ‹MeasurableSpace α›"
    frequency: 3

  # --- 可测性 shortcuts ---
  - trigger: "AEMeasurable f μ from Measurable f"
    tip: ".aemeasurable coercion (also .aestronglyMeasurable)"
    frequency: 15

  - trigger: "need typeclass instance mid-proof"
    tip: "haveI : IsProbabilityMeasure ... := ... (haveI not have, for instance synthesis)"
    frequency: 10

  - trigger: "failed to synthesize SigmaFinite for trimmed measure"
    tip: "haveI : SigmaFinite (μ.trim hm) := inferInstance (from IsFiniteMeasure auto)"
    frequency: 3

  # --- 常见错误修复 ---
  - trigger: "rewrite failed: pattern not found (lambda vs Pi)"
    tip: "Add have h_eq : (fun ω => ...) = ... := rfl then rw [h_eq]; or use change/show"
    frequency: 4

  - trigger: "integral_add rewrite fails (Pi form mismatch)"
    tip: "Use have h := integral_add ... then linarith, don't rw"
    frequency: 3

  - trigger: "simp made no progress"
    tip: "Switch to simp only [specific_lemma] or use rw instead"
    frequency: 5

  - trigger: "linarith failed (missing premise)"
    tip: "Extract needed inequalities with have first, then linarith [h1, h2, h3]"
    frequency: 4

  - trigger: "exact? found no match"
    tip: "Upgrade to Level 3 Mathlib search, or build helper lemma"
    frequency: 3

  - trigger: "unknown identifier after Mathlib upgrade"
    tip: "v4.28 renames: pow_le_pow_left₀, div_le_div_iff₀, exp_nat_mul. Use #check to verify"
    frequency: 3

  # --- ENNReal 陷阱 ---
  - trigger: "ENNReal Summable"
    tip: "ALWAYS true for ENNReal! Use ∑' ≠ ⊤ instead for Borel-Cantelli style arguments"
    frequency: 3

  # --- 杂项技巧 ---
  - trigger: "∃ x, P x (extract witness)"
    tip: "obtain ⟨g, hg, hgT⟩ := ... (standard destructuring)"
    frequency: 15

  - trigger: "strong induction on ℕ"
    tip: "induction k using Nat.strongRecOn with | ind k ih =>"
    frequency: 2

  - trigger: "integral on Fin 0 → ℝ (singleton space)"
    tip: "Subsingleton.elim x Fin.elim0 + integral_const + Measure.real + measure_univ"
    frequency: 2

  - trigger: "nlinarith for mul_comm in inequalities"
    tip: "nlinarith handles commutativity that linarith cannot"
    frequency: 3

  - trigger: "linarith loses < in ≤+< chains"
    tip: "Use add_lt_add_of_le_of_lt explicitly instead"
    frequency: 2

  # --- 除法 / 0÷0 ---
  - trigger: "∫ (g')²/g dμ where g = f² (Fisher information of square)"
    tip: "I(f²) = ∫(2ff')²/f² = 4∫(f')². Lean 0/0=0 makes f=0 case automatic — no need for hf_ne_zero hypothesis. Use div_self_sqrt or direct field_simp."
    frequency: 1
    source: [LogSobolev, prove-deep-2026-03-11]

  # --- ae 传输 (product measure) ---
  - trigger: "∀ᵐ y ∂ν, P(y) → ∀ᵐ z ∂(μ.prod ν), P(z.2)"
    tip: "Use Measure.prod_prod_le: show {z | ¬P z.2} ⊆ univ ×ˢ {y | ¬P y}, bound (μ.prod ν)(univ ×ˢ S) ≤ μ(univ) * ν(S) = 0. No measurability needed. See ae_snd_of_ae_marginal in LogSobolev.lean."
    frequency: 3
    source: [LogSobolev, prove-deep-2026-03-11]

  - trigger: "∀ᵐ z ∂γn, P(z) → ∀ᵐ y ∂γⁿ⁺¹, P((e y).2) via piFinSuccAbove"
    tip: "Chain: prod_left_ae → ae_snd_of_ae_marginal (transfer to product) → QuasiMeasurePreserving.ae (transfer via e). Then .mono to rewrite predicate using Fin.update_insertNth."
    frequency: 3
    source: [LogSobolev, prove-deep-2026-03-11]

  # --- FALSE LEMMA 警告 ---
  - trigger: "f ∈ L²(γ) implies f·poly ∈ L²(γ)?"
    anti: true
    tip: "FALSE! Counterexample exists. Use Hölder: L²·L² ⊆ L¹. Only claim L¹ for products."
    frequency: 1

  - trigger: "entropy_subadditivity for g·log(g) NOT integrable (Lean Bochner convention)"
    anti: true
    tip: "LIKELY FALSE under Lean's ∫=0 convention for non-integrable functions. When g·log(g) ∉ L¹, entropyPi = -(∫g)·log(∫g) can be positive, but ∑∫condEnt_i could be 0 (each condEntropyAt non-integrable → Lean ∫ = 0). Eliminate this case split; use Integrable(g·log g) as hypothesis instead."
    frequency: 1
    source: [LogSobolev, prove-deep-2026-03-11]
