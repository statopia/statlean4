- id: imported.theorem.010.theorem_10
  title: Theorem 10
  kind: theorem
  latex_statement: ": Squared Error\n\n\n  - Consider the squared error for estimation\
    \ _L_ ( _Оё,a_ ) = ( _Оё_  - _a_ ) [2] and some\nprobability _ПҖ_ on Оҳ\n\n  - After\
    \ introducing _Оё_ [Лң] вҲј _ПҖ_ and _X_ вҲЈ _Оё_ [Лң] вҲј _PОё_ Лң, we need to minimize over\
    \ _a_\n\n\n_E_ [( _Оё_ [Лң]         - _a_ ) [2] вҲЈ _X_ = _x_ ]\n\n\n  - The Bayes\
    \ estimator turns out to be the conditional expectation given\n_X_ : _T_ ( _X_\
    \ ) вҲ¶= _E_ [ _Оё_ [Лң] вҲЈ _X_ ]\n\n    - In Bayesian statistics, the conditional\
    \ distribution of _Оё_ [Лң] given _X_ is called\nthe _posterior_ _distribution_\n\
    \n\nLIN Zhenhua (NUS) Lecture 6 15 / 32\n\n\n# Unbiased Estimators\n\n\n  - Let\
    \ _X_ be a sample from an unknown population _P_ вҲҲP and _Оё_ be a\nreal-valued\
    \ parameter related to _P_\n\n  - Recall that an estimator _T_ ( _X_ ) of _Оё_\
    \ is unbiased if and only if\n_E_ [ _T_ ( _X_ )] = _Оё_ for any _P_ вҲҲP\n\n  - If\
    \ there exists an unbiased estimator of _Оё,_ then _Оё_ is called an\n_estimable_\
    \ parameter\n\n  - For squared error loss, the risk of an unbiased estimator is\
    \ equal to its\nvariance\n\n  - We can compare unbiased estimators by their variance\n\
    \n\nLIN Zhenhua (NUS) Lecture 6 16 / 32\n\n\n# UMVUE\n\n\n\n\n\n\n\n\n- вҖңUniformlyвҖқ\
    \ refers to вҖңfor any _P_ вҲҲPвҖқ\n\n- A UMVUE is J-optimal in MSE with J being the\
    \ class of all unbiased\nestimators\n\n- Rao-Blackwell theorem implies that the\
    \ variance of the conditional\nexpectation of an unbiased estimator given a sufficient\
    \ statistic is\nsmaller\n\n- In fact, if the sufficient statistic is also complete,\
    \ this variance is\nuniformly minimal\n\n\nLIN Zhenhua (NUS) Lecture 6 17 / 32\n\
    \n\n- By assumption, there is an unbiased estimator _Оё_ [ЛҶ] for _Оё_\n\n- Let _h_\
    \ ( _T_ ) = _E_ ( _Оё_ [ЛҶ] вҲЈ _T_ ); it does not depend on _P_ because _T_ is sufficient\n\
    \n- Then _Eh_ ( _T_ ) = _EОё_ [ЛҶ] = _Оё_ for all _P_ вҲҲP, i.e., _h_ ( _T_ ) is unbiased\
    \ for _Оё_\n\n- **Uniqueness:** If _g_ ( _T_ ) is another unbiased estimator, we\
    \ have\n_E_ { _h_ ( _T_ ) вҲ’ _g_ ( _T_ )} = 0, вҲҖ _P_ вҲҲP and thus _h_ ( _T_ ) вҲ’\
    \ _g_ ( _T_ ) = 0 a.s. because\n_T_ is complete\n\n- For any other unbiased estimator\
    \ _Оё_ [ЛҶ][вҖІ], since the squared error loss is\nconvex, by Rao-Blackwell theorem,\
    \ its conditional expectation given\n_T_, say _E_ ( _Оё_ [ЛҶ][вҖІ] вҲЈ _T_ ) = _f_ (\
    \ _T_ ), is as good as _Оё_ [ЛҶ][вҖІ]\n\n\n- By the uniqueness, _f_ ( _T_ ) = _h_\
    \ ( _T_ ) a.s., and thus _h_ ( _T_ ) is an **UMVUE**\n\n\nLIN Zhenhua (NUS) Lecture\
    \ 6 18 / 32"
