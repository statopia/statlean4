- id: lecture_9_handout.theorem.006.lindeberg_feller_clt
  title: Theorem 6
  kind: theorem
  latex_statement: "s\n\n\n  - Condition (1) controls the tails of _Xnj_, and is called\
    \ _Lindeberg’s_\n_condition_ .\n\n  - Condition (1) is implied by either of the\
    \ following\n\n    - Lyapunov condition:\n\n\n\n1\n_σn_ [2][+] _[δ]_\n\n\n\n_kn_\n\
    ∑ E∣ _Xnj_ - E _Xnj_ ∣ [2][+] _[δ]_ → 0 for some _δ_ - 0.\n_j_ =1\n\n\n\n\n  -\
    \ Uniform boundedness: if ∣ _Xnj_ ∣≤ _M_ for all _n_ and _j_ and\n_σn_ [2] [=\
    \ ∑] _j_ _[k]_ = _[n]_ 1 [Var][(] _[X][nj]_ [) →∞][.]\n\n- In general, Condition\
    \ (1) is NOT necessary for the convergence result.\n\n- But if we assume the _Feller’s_\
    \ _condition_ :\n\n\nVar( _Xnj_ )\nlim = 0 _,_\n_n_ →∞ [max] _j_ ≤ _kn_ _σn_ [2]\n\
    \n\nthen Condition (1) is not only sufficient but also necessary\n\n\nLIN Zhenhua\
    \ (NUS) Lecture 9 15 / 28"
