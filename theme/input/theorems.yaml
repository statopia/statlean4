    \ J the class of estimators _Оё_ [ЛҶ] _c_ = _cX_ [ВҜ] for _c_ вҲҲ[0 _,_ 1].\n\n  -\
    \ The MSE of _Оё_ [ЛҶ] _c_ is\n\n\n_Rc_ ( _Оё_ ) = (1 вҲ’ _c_ ) [2] _Оё_ [2] + _c_ [2]\
    \ _Пғ_ [2] / _n_\n\n\n  - Now consider a probability on Оҳ : _ПҖ_ = Exp(1) (the exponential\n\
    distribution with rate 1)\n\n  - The Bayes risk of _Оё_ [ЛҶ] _c_ is _rОё_ ЛҶ _c_ (\
    \ _ПҖ_ ) = 2(1 вҲ’ _c_ ) [2] + _c_ [2] _Пғ_ [2] / _n_\n\n  - When _c_ = 2/(2 + _Пғ_\
    \ [2] / _n_ ), _Оё_ [ЛҶ] _c_ is the J-Bayes rule\n\n\nLIN Zhenhua (NUS) Lecture\
    \ 6 13 / 32\n\n\n# Finding a Bayes rule\n\n\n  - We introduce two random elements:\
    \ _Оё_ [Лң] вҲј _ПҖ_ and _X_ вҲЈ _Оё_ [Лң] вҲј _PОё_ Лң (See\nTheorem 1.7(ii) in JS)\n\n  -\
    \ Then the Bayes risk _rПҖ_ ( _T_ ) can be expressed as _E_ [ _L_ ( _Оё,T_ [Лң] (\
    \ _X_ ))],\nwhere _E_ is taken jointly over ( _Оё,X_ [Лң] )\n\n  - Using the tower\
    \ property of conditional expectation, we may rewrite\nthe Bayes risk as\n_E_\
    \ { _E_ [ _L_ ( _Оё,T_ [Лң] ( _X_ )) вҲЈ _X_ ]}\n\n\n  - If for every _x_, _the_ _conditional_\
    \ _risk_ _E_ [ _L_ ( _Оё,a_ [Лң] ) вҲЈ _X_ = _x_ ] as a function of\n_a_ is minimized\
    \ at _a_ = _T_ вҲ—( _x_ ), then _T_ вҲ— is the Bayes rule w.r.t. _ПҖ_\n\n\nLIN Zhenhua\
    \ (NUS) Lecture 6 14 / 32"
