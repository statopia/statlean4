  latex_statement: "s\n\n\n  - Like the consistency, the asymptotic bias is a concept\
    \ relating to\nsequences { _Tn_ } and { [ЋЬ] _bTn_ ( _P_ )}\n\n  - When both the\
    \ exact bias _bTn_ ( _P_ ) and the asymptotic bias [ЋЬ] _bTn_ ( _P_ )\nexist, they\
    \ are NOT necessarily the same\n\n  - If _Tn_ is a consistent estimator of _ќЄ_,\
    \ then _Tn_ = _ќЄ_ + _op_ (1), and thus _Tn_\nis asymptotically unbiased\n\n  \
    \  - _g_ ( _Tn_ ) is asymptotically unbiased for _g_ ( _ќЄ_ ) for any continuous\
    \ function _g_\n_a.s._\n\n    - In the example of estimating 1/ _¬µ_ by _Tn_ =\
    \ 1/ _X_ [¬ѓ], _Tn_ вЖТ 1/ _¬µ_ by the\nSLLN and the continuous mapping. Hence _Tn_\
