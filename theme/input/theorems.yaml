version: v1
theorem_set: lec4-theorem-a
defaults:
  lean_namespace: Statlean
  layer: formalization
  allow_axiom: false
theorems:
- id: lec4.theorem_a
  title: "Theorem (A): Subfamily extension criterion for minimal sufficiency"
  kind: theorem
  latex_statement: |
    Suppose P₀ ⊂ P and P₀-a.s. implies P-a.s.
    If T is sufficient for P ∈ P and minimal sufficient for P ∈ P₀,
    then T is minimal sufficient for P ∈ P.
  latex_proof_hint: |
    Suppose S is sufficient for P.
    Since P₀ ⊂ P, S is also sufficient for P₀.
    Since T is minimal sufficient for P₀, T = ψ(S) P₀-a.s.
    Since P₀-a.s. implies P-a.s., T = ψ(S) P-a.s.
    So T is minimal sufficient for P.
  lean_name: "minimalSufficient_of_subfamily"
  lean_statement: |
    theorem minimalSufficient_of_subfamily
        {Θ₀ : Type*} {Θ : Type*} {Ω α β : Type*}
        [MeasurableSpace Ω] [MeasurableSpace α] [MeasurableSpace β]
        (P₀ : ParametricFamily Θ₀ Ω) (P : ParametricFamily Θ Ω)
        (embed : Θ₀ → Θ) (h_embed : ∀ θ₀, P₀.measure θ₀ = P.measure (embed θ₀))
        (h_lift : ∀ {f g : Ω → ℝ}, (∀ θ₀, f =ᵐ[P₀.measure θ₀] g) → (∀ θ, f =ᵐ[P.measure θ] g))
        (T : Ω → α)
        (hT_suff : IsSufficient' P T)
        (hT_min₀ : IsMinimalSufficient' P₀ T) :
        IsMinimalSufficient' P T := by
      sorry
  lean_namespace: Statlean.Sufficiency.MinimalSufficiency
  layer: formalization
  priority: 1
  dependencies: []
  assumptions: []
  acceptance:
  - lake build passes
  - theorem contains no sorry
  notes: |
    Lecture 4, page 11 (Theorem A).
    Uses IsSufficient' and IsMinimalSufficient' from Statistic/Basic.lean.
    Short proof: transitivity of sufficiency + hypothesis lifting.
