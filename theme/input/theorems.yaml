  kind: definition
  latex_statement: ''
  latex_proof_hint: ''
  lean_name: density_likelihood
  lean_statement: "noncomputable def density (M : DominatedModel Θ Ω) (θ : Θ) : Ω\
    \ → ℝ≥0∞ :=\n  (M.measure θ).rnDeriv M.base\nnoncomputable def likelihood (M :\
    \ DominatedModel Θ Ω) (x : Ω) : Θ → ℝ≥0∞ :=\n  fun θ => density M θ x"
