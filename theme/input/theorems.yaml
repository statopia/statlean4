- id: lecture_9_handout.theorem.009.fisher_information
  title: Theorem 9
  kind: theorem
  latex_statement: "s\n\n\n  - It holds that “amse= asym. bias [2] + asym. variance”\
    \ if they are all\nwell defined\n\n  - In the definition, the amse and asymptotic\
    \ variance are the same if\nand only if _EY_ = 0\n\n  - In the definition, one\
    \ can show that\n\n\n_EY_ [2] ≤ liminf _n_ →∞ _[E]_ [ [] _[a]_ _n_ [2] [(] _[T][n]_\
    \ [−] _[ϑ]_ [)][2][]]\n\n\n    - Proof is left for exercise: use Skorohod’s theorem\
    \ and Fatou’s lemma\n\n    - The equality holds if and only if { _a_ [2] _n_ [(]\
    \ _[T][n]_ [−] _[ϑ]_ [)][2][}] [is] [uniformly] [integrable.]\n\n    - In other\
    \ words, the amse is no greater than the exact mse and they are\nequal under a\
    \ certain condition.\n\n\nLIN Zhenhua (NUS) Lecture 9 21 / 28\n\n\n# Asymptotic\
