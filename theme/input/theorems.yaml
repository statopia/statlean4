- id: lecture_9_handout.theorem.008.continuous_mapping_theorem
  title: Theorem 8
  kind: theorem
  latex_statement: "s\n\n\n  - Like the consistency, the asymptotic bias is a concept\
    \ relating to\nsequences { _Tn_ } and { [˜] _bTn_ ( _P_ )}\n\n  - When both the\
    \ exact bias _bTn_ ( _P_ ) and the asymptotic bias [˜] _bTn_ ( _P_ )\nexist, they\
    \ are NOT necessarily the same\n\n  - If _Tn_ is a consistent estimator of _θ_,\
    \ then _Tn_ = _θ_ + _op_ (1), and thus _Tn_\nis asymptotically unbiased\n\n  \
    \  - _g_ ( _Tn_ ) is asymptotically unbiased for _g_ ( _θ_ ) for any continuous\
    \ function _g_\n_a.s._\n\n    - In the example of estimating 1/ _µ_ by _Tn_ =\
    \ 1/ _X_ [¯], _Tn_ → 1/ _µ_ by the\nSLLN and the continuous mapping. Hence _Tn_\
    \ is asymptotically\nunbiased, although _ETn_ may not be well-defined.\n\n\nLIN\
    \ Zhenhua (NUS) Lecture 9 19 / 28\n\n\n# Asymptotic Mean Squared Error (amse)\n\
    \nLike the bias, the variance and MSE of an estimator is not well defined if\n\
    its second moment does not exist\n\n\n\n\n\n\n\n\n\nLIN Zhenhua (NUS) Lecture\
    \ 9 20 / 28"
