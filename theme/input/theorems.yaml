- id: lecture_9_handout.theorem.007.slln
  title: Theorem 7
  kind: theorem
  latex_statement: ": Asymptotic Distribution of Empirical Variance\n\n\n  - Let _X_\
    \ 1 _,...,Xn_ be i.i.d. such that E _X_ 1 [4] [< ∞][.]\n\n  - Denote _σ_ [2] =\
    \ Var( _X_ 1), _µ_ = E _X_ 1, and _m_ 2 = E _X_ 1 [2][.]\n\n  - Let _µ_ ˆ = _X_\
    \ = _n_ [−][1] ∑ _[n]_ _i_ =1 _[X][i]_ [and] _[σ]_ [ˆ][2][ =] _[ n]_ [−][1][ ∑]\
    \ _[n]_ _i_ =1 [(] _[X][i]_ [ −] _[X]_ [)][2][.]\n\nNow we derive the asymptotic\
    \ distribution of ~~[√]~~ _n_ ( _σ_ ˆ [2] - _σ_ [2] ).\n\n  - Note that _σ_ ˆ\
    \ [2] = _m_ ˆ 2 − _µ_ ˆ [2], where _m_ ˆ 2 = _n_ [−][1] ∑ _[n]_ _i_ =1 _[X]_ _i_\
    \ [2][.]\n\n  - This motivates us to define _g_ ( _y_ 1 _,y_ 2) = _y_ 2 − _y_\
    \ 1 [2][.]\n\n  - By multivariate CLT, for _Yn_ = ( _µ,_ ˆ _m_ ˆ 2) [⊺], we have\n\
    ~~√~~ _n_ ( _Yn_  - _c_ ) → _D_ _N_ (0 _,_ Σ), where _c_ = ( _µ,m_ 2) and Σ =\
    \ Cov([ _X_ 1 _,X_ 12 []][⊺][)][.]\n\n  - Observe that ∇ _g_ ( _y_ 1 _,y_ 2) =\
    \ (−2 _y_ 1 _,_ 1) [⊺] ≠ 0.\n\n  - By _δ_ -method,\n\n~~√~~ _n_ ( _σ_ ˆ2 − _σ_\
    \ 2) → _D_ _N_ (0 _,_ (−2 _µ,_ 1)Σ(−2 _µ,_ 1)⊺) _._\n\n\nLIN Zhenhua (NUS) Lecture\
    \ 9 16 / 28\n\n\n# Needs for the Asymptotic Approach\n\n\n  - In many applications\
    \ of statistics, the distribution of a given statistic\n_Tn_ ( _X_ ) is needed,\
    \ but the exact distributions of _Tn_ ( _X_ ) is not\navailable or too complicated\
    \ to deal with\n\n  - The limiting distribution is used as an approximation to\
    \ the\ndistribution of _Tn_ ( _X_ ) in the situation with a large but actually\
    \ finite\n_n_\n\n\n    - by using CLT, SLLN, WLLN, _δ_ -method, etc.\n\n    -\
    \ We treat a sample _X_ = ( _X_ 1 _,...,Xn_ ) as a member of a sequence of\nsamples\
    \ corresponding to _n_ = 1 _,_ 2 _,..._\n\n    - Similarly, a statistic _T_ (\
    \ _X_ ), often denoted by _Tn_ to emphasize its\ndependence on the sample size\
    \ _n_, is viewed as a member of a sequence\n_T_ 1 _,T_ 2 _,..._\n\n  - In addition,\
    \ the asymptotic approach requires less stringent\nmathematical assumptions than\
    \ does the exact approach\n\n\nLIN Zhenhua (NUS) Lecture 9 17 / 28\n\n\n# Asymptotic\
    \ Unbiasedness\n\n\n\n\n\n\n\n\n\n\n\n\n\nLIN Zhenhua (NUS) Lecture 9 18 / 28"
