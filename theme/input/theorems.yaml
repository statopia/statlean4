  - theorem contains no sorry
  - theorem contains no axiom
  notes: ''
- id: imported.definition.002.kullback_leibler_information
  title: Kullback-Leibler Information
  kind: definition
  latex_statement: 'The limit of the log-likelihood ratio is $-\mathbb{E}_{\theta_0}
    \log \frac{f(X|\theta_0)}{f(X|\theta)}$.


    Define the **Kullback-Leibler (KL) information number** as

    \[K(f_0, f_1) = \mathbb{E}_0 \log \frac{f_0(X)}{f_1(X)} = \int \log \left(\frac{f_0(x)}{f_1(x)}\right)
    f_0(x) d\nu(x)\]


    When $f$ is indexed by $\theta$, we may also write $K(\theta_0, \theta_1)$ for
    short.'
  latex_proof_hint: ''
  lean_name: definition_002_kullback_leibler_information
