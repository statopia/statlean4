- id: imported.theorem.001.uslln_c
  title: USLLN, C
  kind: theorem
  latex_statement: 'Let $X_1, \ldots, X_n, \ldots$ be i.i.d. sample from $P$ on the
    space $\mathcal{X}$. Let $U(x,\theta)$ be a measurable function on $\mathcal{X}
    \times \Theta$. Suppose

    1. $U(x,\theta)$ is continuous in $\theta$ for any fixed $x$,

    2. for each $\theta$, $\mu(\theta) = \mathbb{E}U(X,\theta)$ is finite,

    3. $\Theta$ is compact,

    4. there exists a function $M(x)$ such that $\mathbb{E}M(X) < \infty$ and $|U(x,\theta)|
    \leq M(x)$ for all $x$ and $\theta$.


    Then

    \[P\left\{\lim_{n \to \infty} \sup_{\theta \in \Theta} \left|\frac{1}{n} \sum_{j=1}^n
    U(X_j, \theta) - \mu(\theta)\right| = 0\right\} = 1\]'
  latex_proof_hint: ''
  lean_name: theorem_001_uslln_c
  lean_namespace: Statlean.Concentration
  layer: formalization
  priority: 3
  dependencies: []
  assumptions: []
