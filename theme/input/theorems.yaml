    \nLIN Zhenhua (NUS) Lecture 9 4 / 28\n\n\n- e.g. _Xn_ ∼ _tn_, then _Xn_ →D _X_\
    \ ∼ _N_ (0 _,_ 1): The density of _Xn_ is\n\n\n\nΓ ( _[n]_ [+][1]\n_fn_ ( _x_\
    \ ) = ~~√~~ 2\n\n\n\n\n_[x]_ [2]\n\n_n_ _n_\n\n2 [) (][1][ +]\n\n\n\n_n_ [)]\n\
    \n\n\nΓ ( _[n]_ [+][1]\n\n2 [)]\n~~√~~ _nπ_ Γ ( _n_\n\n\n\n\n- _[n]_ [+][1]\n\n\
    2\n\n\n\nsatisfies _fn_ ( _x_ ) → _ϕ_ ( _x_ ) = (2 _π_ ) [−][1][/][2] _e_ [−]\
    \ _[x]_ [2][/][2] pointwise.\n\n - Note that we use the asymptotic property of\
    \ gamma function:\nΓ( _x_ + _α_ ) ∼ Γ( _x_ ) _x_ _[α]_ as _x_ →+∞, for any fixed\
