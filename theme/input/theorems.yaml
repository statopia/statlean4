theorems:
- id: lec4.theorem_b2
  title: "Theorem (B.2): Density ratio statistic is minimal sufficient"
  kind: theorem
  latex_statement: |
    Suppose $\mathcal{P} = \{P_\theta : \theta \in \Theta\}$ is dominated by $\nu$
    with densities $f_\theta$. Fix $\theta_0 \in \Theta$ and suppose
    $\{x : f_\theta(x) > 0\} \subset \{x : f_{\theta_0}(x) > 0\}$ $\nu$-a.e. for all $\theta$.
    Define $T(x) = (f_\theta(x) / f_{\theta_0}(x))_\theta$. Then $T$ satisfies the
    density ratio condition, hence is minimal sufficient.
  latex_proof_hint: |
    The density ratio condition is automatically satisfied:
    if f_θ(x) = f_θ(y) · φ for all θ, then in particular
    f_θ(x)/f_{θ₀}(x) = f_θ(y)/f_{θ₀}(y) for all θ (using θ₀ to normalize),
    so T(x) = T(y).
    Combined with Theorem (C), T is minimal sufficient.
  lean_name: "densityRatio_satisfies_DRC"
  lean_namespace: Statlean.Sufficiency.MinimalSufficiency
  layer: formalization
  priority: 1
  dependencies: []
  assumptions: []
  acceptance:
  - lake build passes
  - theorem contains no sorry
  notes: |
    Lecture 4, page 12 (Theorem B, part 2).
    Key insight: density ratios T_θ(x) = f_θ(x)/f_{θ₀}(x) automatically satisfy
    the density ratio condition from Theorem (C). The proof is a direct
    application of minimalSufficient_of_densityRatio.
    Uses DominatedFamily and DensityRatioCondition from MinimalSufficiency.lean.
