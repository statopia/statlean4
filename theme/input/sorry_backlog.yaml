  estimated_lines: 350
  dependencies: []
  unlocks: []
  stuck_rounds: 0
  route_notes: |
    R6 route researched 2026-05-06. Strategy: Wang & Ramdas, "Elementary proofs of
    several results on false discovery rate", arXiv:2201.09350v3 (2022), Theorem 1,
    Second Proof. Avoids martingales (Storey 2002) and PRDS lattice (Benjamini-Yekutieli
    2001). Reduces to: (a) replacement identity decoupling P_k from rejection count,
    (b) independence factorization E[1·1] = ℙ·ℙ, (c) p-value validity bound, (d) ∑pmf ≤ 1.
    
    Sub-lemma DAG (9 lemmas, see file docstring for full detail):
      L0 bhReplaced              ~5    (P with k-th coord set to 0)
      L1 bhCutoff_take_values    ~25   (cutoff ∈ {0, α/m, 2α/m, …, α})
      L2 bhRejectionCount        ~40   (count + sorted_get_le_iff_countP reuse)
      L3 bhReplaced_eventEq      ~80   *KEYSTONE* (replacement identity, μ-a.e.)
      L4 bhReplaced_measurable   ~30   (R_k measurable wrt P_{≠k})
      L5 indep_loo               ~25   (leave-one-out indep from iIndepFun.indepFun_finset)
      L6 pvalue_validity_ofReal  ~10   (direct from IsValidPValue.prob_le)
      L7 indep_factor            ~25   (IndepFun.measure_inter_preimage_eq_mul)
      L8 sum_pmf_le_one          ~15   (disjoint events, IsProbabilityMeasure)
      L9 main bh_fdr_le          ~80   (assembly: decomp → L3 → L7 → L6 → L8)
    Total ~335 lines + scaffolding ≈ 350.
    
    Key Mathlib reuse: ProbabilityTheory.iIndepFun, IsProbabilityMeasure,
    IndepFun.measure_inter_preimage_eq_mul, Finset.sum_comm.
    Key Statlean reuse: Conformal.MarginalCoverage.sorted_get_le_iff_countP (for L2),
    MultipleTesting.Basic.IsValidPValue (for L6), Conformal.Basic mergeSort idiom.
    
    Risk: L3 (replacement identity) is the only nontrivial sub-lemma. Fallback to
    finite-disjunction via L1's discrete cutoff range adds ~30 lines if monotonicity
    argument stalls.
    
    Literature scan: no prior formalization found in Lean/Isabelle-AFP/Coq-MathComp
    as of 2026-05-06 — this would be the first.

