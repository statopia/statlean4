theorems:
  - id: input.assumption.A2.highdim_mediation_moment_bound
    title: Assumption (A2) — conditional (2+ν)-moment bound on mediation errors
    kind: assumption
    latex_statement: |
      (A2) $\displaystyle\max_{1\le i \le n}\,\max\!\Bigl\{
              \mathbb{E}\bigl[|E_{M,i}|^{2+\nu}\mid X_i\bigr],\;
              \mathbb{E}\bigl[|Z_i|^{2+\nu}\mid X_i\bigr]
            \Bigr\} \le M_0$
      for constants $\nu>0$ and $M_0>0$.

      Here, as fixed in Assumption (A1) of the same paper:
      $X_1,\ldots,X_n \in \mathbb{R}^{q+p}$ are the i.i.d. centered covariate vectors,
      $E_{M,i}$ is the mediator-component of the error vector $E_i$
      (with $\mathbb{E}[E_i \mid A_i]=0$, $\operatorname{Var}[E_i \mid A_i]=\Sigma_E$),
      and $Z_i$ is the outcome error with $\mathbb{E}[Z_i\mid X_i]=0$,
      $\mathbb{E}[Z_i^2\mid X_i]=\sigma_Z^2$.
    latex_proof_hint: ''
    proof_body: ''
    lean_name: AssumptionA2
    lean_namespace: Statlean.Web.jobmocuz5dbpvoy
    layer: formalization
    priority: 3
    dependencies: []
    assumptions: []
    acceptance:
      - lake build passes
      - definition is a Prop capturing the conditional (2+ν)-moment bound
      - ν > 0 and M₀ > 0 are explicit parameters
      - bound applied to both E_M and Z for every sample index i
      - no sorry, no axiom, no trivial wrapper
    notes: |
      Assumption (A2) is a pure hypothesis (not a theorem to be proved).
      The Lean formalization defines it as a Prop-valued `structure` capturing:
        * ν-positivity, M₀-positivity
        * for every i ∈ Fin n, the conditional (2+ν)-moment of E_M i given
          the σ-algebra generated by X_i is ≤ M₀ a.e.
        * likewise for Z_i
      The conditioning σ-algebras `𝓧 : Fin n → MeasurableSpace Ω` abstract the
      σ-algebra generated by the random vector X_i (paper writes "· | X_i").
    canonical_name: Mediation Error (2+ν)-Moment Bound
