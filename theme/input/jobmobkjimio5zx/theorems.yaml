theorems:
- id: dkw.inequality
  title: Dvoretzky-Kiefer-Wolfowitz (DKW) inequality (Massart constant)
  kind: theorem
  latex_statement: |
    Let $X_1, \ldots, X_n \sim F$ i.i.d. with common distribution function $F$,
    and let the empirical distribution function be
    \[
      F_n(x) = \frac{1}{n}\sum_{i=1}^n \mathbf{1}_{\{X_i \leq x\}}.
    \]
    Then for any $\varepsilon > 0$,
    \[
      \mathbb{P}\!\left(\sup_x |F_n(x) - F(x)| > \varepsilon\right) \le 2 e^{-2 n \varepsilon^2}.
    \]
  latex_proof_hint: |
    Massart (1990) established the tight constant 2. The proof proceeds via
    a symmetrization argument and a chaining bound for Bernoulli processes
    indexed by half-lines $\{(-\infty, x] : x \in \mathbb{R}\}$, using the
    VC-subgraph property of the half-line class (VC dimension 1). Alternative
    routes: (i) Talagrand's concentration inequality applied to the bounded
    differences functional $F \mapsto \sup_x |F_n(x) - F(x)|$; (ii) the original
    DKW approach via Gaussian approximation (non-sharp constant 2). The 2-constant
    is the Massart refinement and is the sharpest possible.
  classification:
    module: EmpiricalProcess
    topic: concentration
