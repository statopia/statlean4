    lean_sketch: |
      def IsStatistic {Ω α : Type*} [MeasurableSpace Ω] [MeasurableSpace α]
          (T : Ω → α) : Prop :=
        Measurable T

  # ─────────────────────────────────────────────────────────────
  # L3: Structured Families
  # ─────────────────────────────────────────────────────────────
  - id: exponential_family
    name: "Exponential Family"
    level: 3
    kind: definition
    parent: dominated_model
    requires: [dominated_model, density_likelihood]
    msc: "62E10"
    lean_topic: "ExpFamily"
    lean_module: "Basic"
    mathlib: ""
    statlean: ""
    keywords: ["exponential family", "natural parameter", "natural exponential"]
    lean_sketch: |
      structure ExponentialFamily (Θ Ω : Type*) [MeasurableSpace Ω]
          extends DominatedModel Θ Ω where
        k : ℕ
        T : Ω → Fin k → ℝ            -- sufficient statistic
        η : Θ → Fin k → ℝ            -- natural parameter
        A : Θ → ℝ                     -- log-partition function
        h : Ω → ℝ≥0∞                  -- base measure density
        density_eq : ∀ θ x, density ⟨toParametricFamily, base, isSigmaFinite, absolutelyContinuous⟩ θ x =
          h x * .ofReal (exp (∑ j, η θ j * T x j - A θ))

  - id: natural_parameter
    name: "Natural Parameter Space"
    level: 3
    kind: definition
    parent: exponential_family
    requires: [exponential_family]
    msc: "62E10"
    lean_topic: "ExpFamily"
    lean_module: "Basic"
    mathlib: ""
    statlean: ""
    keywords: ["natural parameter", "canonical parameter"]
    lean_sketch: |
      def NaturalParameterSpace (E : ExponentialFamily Θ Ω) : Set (Fin E.k → ℝ) :=
        {η | ∫⁻ x, E.h x * .ofReal (exp (∑ j, η j * E.T x j)) ∂E.base < ⊤}

  - id: log_partition
    name: "Log-Partition Function"
    level: 3
    kind: definition
    parent: exponential_family
    requires: [exponential_family, mgf]
    msc: "62E10"
    lean_topic: "ExpFamily"
    lean_module: "Basic"
    mathlib: ""
    statlean: ""
    keywords: ["log partition", "cumulant generating", "cgf"]
    lean_sketch: |
      noncomputable def logPartition (E : ExponentialFamily Θ Ω) (η : Fin E.k → ℝ) : ℝ :=
        Real.log (∫⁻ x, E.h x * .ofReal (exp (∑ j, η j * E.T x j)) ∂E.base).toReal

