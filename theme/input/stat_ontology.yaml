    lean_module: "Basic"
    mathlib: ""
    statlean: ""
    keywords: ["risk", "loss function", "risk function"]
    lean_sketch: |
      noncomputable def risk {Ω : Type*} [MeasurableSpace Ω]
          (P : ParametricFamily Θ Ω) (L : Θ → ℝ → ℝ → ℝ) (δ : Ω → ℝ) (g : Θ → ℝ)
          (θ : Θ) : ℝ :=
        ∫ ω, L θ (g θ) (δ ω) ∂(P.measure θ)

