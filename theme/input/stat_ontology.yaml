    lean_sketch: |
      noncomputable def fisherInformation {Ω : Type*} [MeasurableSpace Ω]
          (M : DominatedModel ℝ Ω) (θ : ℝ) : ℝ :=
        ∫ ω, (scoreFunction M θ ω) ^ 2 ∂(M.measure θ)

