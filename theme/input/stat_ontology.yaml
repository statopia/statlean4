  - id: parametric_family
    name: "Parametric Family"
    level: 2
    kind: definition
    parent: probability_measure
    requires: [probability_measure]
    msc: "62F10"
    lean_topic: "Statistic"
    lean_module: "Basic"
    mathlib: ""
    statlean: ""
    keywords: ["parametric family", "statistical model", "parametric model"]
    lean_sketch: |
      structure ParametricFamily (Θ Ω : Type*) [MeasurableSpace Ω] where
        measure : Θ → Measure Ω
        isProbability : ∀ θ, IsProbabilityMeasure (measure θ)

  - id: dominated_model
    name: "Dominated Statistical Model"
    level: 2
    kind: definition
    parent: parametric_family
    requires: [parametric_family, sigma_finite, radon_nikodym]
    msc: "62B05"
    lean_topic: "Statistic"
    lean_module: "Basic"
    mathlib: ""
    statlean: ""
    keywords: ["dominated model", "dominated family", "dominating measure"]
    lean_sketch: |
      structure DominatedModel (Θ Ω : Type*) [MeasurableSpace Ω]
          extends ParametricFamily Θ Ω where
        base : Measure Ω
        isSigmaFinite : SigmaFinite base
        absolutelyContinuous : ∀ θ, measure θ ≪ base

  - id: density_likelihood
    name: "Density / Likelihood"
    level: 2
    kind: definition
    parent: dominated_model
    requires: [dominated_model, radon_nikodym]
    msc: "62F10"
    lean_topic: "Statistic"
    lean_module: "Basic"
    mathlib: ""
    statlean: ""
    keywords: ["density", "likelihood", "pdf"]
    lean_sketch: |
      noncomputable def density (M : DominatedModel Θ Ω) (θ : Θ) : Ω → ℝ≥0∞ :=
        (M.measure θ).rnDeriv M.base
      noncomputable def likelihood (M : DominatedModel Θ Ω) (x : Ω) : Θ → ℝ≥0∞ :=
        fun θ => density M θ x

  - id: identifiable
    name: "Identifiable Model"
    level: 2
