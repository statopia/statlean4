    lean_topic: "Statistic"
    lean_module: "Basic"
    mathlib: ""
    statlean: ""
    keywords: ["identifiable", "identifiability"]
    lean_sketch: |
      def Identifiable (P : ParametricFamily Θ Ω) : Prop :=
        Function.Injective P.measure

  - id: sample
    name: "Random Sample"
    level: 2
    kind: definition
    parent: random_variable
    requires: [random_variable, independence, identically_distributed, product_measure]
    msc: "62D05"
    lean_topic: "Statistic"
    lean_module: "Basic"
    mathlib: ""
    statlean: ""
    keywords: ["random sample", "iid sample", "sample"]
    lean_sketch: |
      def IsSample {Ω : Type*} [MeasurableSpace Ω] {n : ℕ}
          (X : Fin n → Ω → ℝ) (μ : Measure Ω) [IsProbabilityMeasure μ] : Prop :=
        iIndepFun (fun _ => inferInstance) X μ ∧
        ∀ i j, IdentDistrib (X i) (X j) μ μ

