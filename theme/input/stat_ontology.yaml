# Statistical Inference Knowledge Ontology
# Sources: MSC 2020, Wikipedia dependency chains, Fritz Markov categories,
#          ProbOnto, Mathlib module structure
#
# Each concept has:
#   id            — unique snake_case identifier
#   name          — human-readable name
#   level         — hierarchy layer (0–7)
#   kind          — definition | theorem | structure
#   parent        — parent concept ID (taxonomic)
#   requires      — list of concept IDs this concept's definition depends on
#   msc           — MSC 2020 classification code
#   lean_topic    — Statlean subdirectory for classify.py routing
#   lean_module   — Statlean submodule (Basic for definitions, specific for theorems)
#   mathlib       — Mathlib module path (if exists)
#   statlean      — Statlean file path (if implemented)
#   lean_sketch   — optional Lean 4 skeleton (def/structure + sorry)
#   keywords      — search keywords for classify.py matching

