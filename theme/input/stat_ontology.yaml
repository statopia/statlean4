  # ─────────────────────────────────────────────────────────────
  # L4: Statistics & Reduction
  # ─────────────────────────────────────────────────────────────
  - id: sufficient
    name: "Sufficient Statistic"
    level: 4
    kind: definition
    parent: statistic
    requires: [statistic, conditional_expectation, parametric_family]
    msc: "62B05"
    lean_topic: "Statistic"
    lean_module: "Basic"
    mathlib: ""
    statlean: ""
    keywords: ["sufficient statistic", "sufficiency"]
    lean_sketch: |
      def IsSufficient {Ω α : Type*} [MeasurableSpace Ω] [MeasurableSpace α]
          (P : ParametricFamily Θ Ω) (T : Ω → α) : Prop :=
        Measurable T ∧
        ∀ (s : Set Ω), MeasurableSet s →
          ∀ θ₁ θ₂ : Θ,
            (P.measure θ₁)[fun ω => s.indicator 1 ω | MeasurableSpace.comap T ‹_›] =ᵐ[P.measure θ₁]
            (P.measure θ₂)[fun ω => s.indicator 1 ω | MeasurableSpace.comap T ‹_›]

  - id: complete
    name: "Complete Statistic"
    level: 4
    kind: definition
    parent: statistic
    requires: [statistic, expectation, parametric_family]
    msc: "62B05"
    lean_topic: "Statistic"
    lean_module: "Basic"
    mathlib: ""
    statlean: ""
    keywords: ["complete statistic", "completeness"]
    lean_sketch: |
      def IsComplete {Ω α : Type*} [MeasurableSpace Ω] [MeasurableSpace α]
          (P : ParametricFamily Θ Ω) (T : Ω → α) : Prop :=
        ∀ (g : α → ℝ), Measurable g →
          (∀ θ, ∫ ω, g (T ω) ∂(P.measure θ) = 0) →
          ∀ θ, ∀ᵐ ω ∂(P.measure θ), g (T ω) = 0

  - id: bounded_complete
    name: "Boundedly Complete Statistic"
    level: 4
    kind: definition
    parent: complete
    requires: [complete]
    msc: "62B05"
    lean_topic: "Statistic"
    lean_module: "Basic"
    mathlib: ""
    statlean: ""
    keywords: ["boundedly complete", "bounded completeness"]
    lean_sketch: |
      def IsBoundedComplete {Ω α : Type*} [MeasurableSpace Ω] [MeasurableSpace α]
          (P : ParametricFamily Θ Ω) (T : Ω → α) : Prop :=
        ∀ (g : α → ℝ), Measurable g → (∃ C, ∀ a, |g a| ≤ C) →
          (∀ θ, ∫ ω, g (T ω) ∂(P.measure θ) = 0) →
          ∀ θ, ∀ᵐ ω ∂(P.measure θ), g (T ω) = 0

  - id: ancillary
    name: "Ancillary Statistic"
    level: 4
    kind: definition
    parent: statistic
    requires: [statistic, parametric_family, measure_map]
    msc: "62B05"
    lean_topic: "Statistic"
    lean_module: "Basic"
    mathlib: ""
    statlean: ""
    keywords: ["ancillary", "ancillarity"]
    lean_sketch: |
      def IsAncillary {Ω α : Type*} [MeasurableSpace Ω] [MeasurableSpace α]
          (P : ParametricFamily Θ Ω) (T : Ω → α) : Prop :=
        Measurable T ∧ ∀ θ₁ θ₂ : Θ, (P.measure θ₁).map T = (P.measure θ₂).map T

  - id: minimal_sufficient
    name: "Minimal Sufficient Statistic"
    level: 4
    kind: definition
    parent: sufficient
    requires: [sufficient]
    msc: "62B05"
    lean_topic: "Statistic"
    lean_module: "Basic"
    mathlib: ""
    statlean: ""
    keywords: ["minimal sufficient"]
    lean_sketch: |
      def IsMinimalSufficient {Ω α β : Type*}
          [MeasurableSpace Ω] [MeasurableSpace α] [MeasurableSpace β]
          (P : ParametricFamily Θ Ω) (T : Ω → α) : Prop :=
        IsSufficient P T ∧
          ∀ (U : Ω → β), Measurable U → IsSufficient P U →
            ∃ (f : β → α), Measurable f ∧ T = f ∘ U

