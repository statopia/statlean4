    mathlib: ""
    statlean: ""
    keywords: ["score function", "score"]
    lean_sketch: |
      noncomputable def scoreFunction {Ω : Type*} [MeasurableSpace Ω]
          (M : DominatedModel ℝ Ω) (θ : ℝ) (ω : Ω) : ℝ :=
        deriv (fun θ' => Real.log (density M θ' ω).toReal) θ

