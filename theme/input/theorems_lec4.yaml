  - id: lec4.ancillary
    title: "Ancillary Statistic"
    kind: definition
    latex_statement: |
      A statistic $V(X)$ is ancillary for $P \in \mathcal{P}$ if the distribution of $V(X)$
      does not depend on $P$.
