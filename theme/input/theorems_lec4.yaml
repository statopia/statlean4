  - id: lec4.basu
    title: "Basu's Theorem"
    kind: theorem
    latex_statement: |
      Let $V$ and $T$ be two statistics of $X$ from a population $P \in \mathcal{P}$.
      If $V$ is ancillary and $T$ is boundedly complete and sufficient for $P \in \mathcal{P}$,
      then $V$ and $T$ are independent w.r.t. any $P \in \mathcal{P}$.
    latex_proof_hint: |
      Since V is ancillary, P(V in B) is constant c_B.
      Since T is sufficient, E_P[I_B(V)|T] = h_B(T).
      By tower: E_P[h_B(T) - c_B] = 0 for all P.
      By bounded completeness: h_B(T) = c_B a.s.
      Then P(T in A, V in B) = E[I_A(T) h_B(T)] = P(T in A) P(V in B).
    lean_namespace: "Statlean.Sufficiency"
    lean_name: "basu_theorem"
    lean_statement: ""
    lean_proof: ""
    keywords: ["basu", "ancillary", "complete sufficient", "independence"]
    layer: statlib
    priority: 3
    dependencies: [lec4.bounded_completeness, lec4.ancillary]
