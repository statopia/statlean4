$schema: "https://json-schema.org/draft/2020-12/schema"
title: "Theorem Batch Schema"
type: object
required:
  - version
  - theorem_set
  - theorems
properties:
  version:
    type: string
    pattern: "^v[0-9]+(\\.[0-9]+)*$"
  theorem_set:
    type: string
    minLength: 1
  defaults:
    type: object
    properties:
      lean_namespace:
        type: string
      layer:
        type: string
        enum: [statlib, formalization]
      allow_axiom:
        type: boolean
    additionalProperties: false
  theorems:
    type: array
    minItems: 1
    items:
      type: object
      required:
        - id
        - title
        - kind
        - latex_statement
        - lean_name
        - lean_namespace
        - layer
        - priority
        - dependencies
      properties:
        id:
          type: string
          pattern: "^[a-z0-9_.-]+$"
        title:
          type: string
          minLength: 1
        kind:
          type: string
          enum: [theorem, lemma, corollary, proposition, definition]
        latex_statement:
          type: string
          minLength: 1
        latex_proof_hint:
          type: string
        lean_name:
          type: string
          pattern: "^[A-Za-z0-9_']+$"
        lean_namespace:
          type: string
          minLength: 1
        layer:
          type: string
          enum: [statlib, formalization]
        priority:
          type: integer
          minimum: 1
          maximum: 5
        dependencies:
          type: array
          items:
            type: string
          uniqueItems: true
        assumptions:
          type: array
          items:
            type: string
        lean_statement:
          type: string
        lean_proof:
          type: string
        acceptance:
          type: array
          items:
            type: string
        notes:
          type: string
      additionalProperties: false
additionalProperties: false
